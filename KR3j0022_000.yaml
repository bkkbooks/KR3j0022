body:
  text: 本語雜家類一雜學之屬提要臣等謹案本語六卷明髙拱撰拱有春秋正㫖已著録是書成于萬歴丙子距拱罷歸之日已十三年故開卷即以否泰兩卦君子小人消長為言其中論裴度論劉晏皆隂以自比論李林甫論哈麻皆以隂比徐階論盧懐慎則隂比殷士儋輩亦發憤而著書者也其間如隆慶六年宿良鄉夢見孔子之類頗為夸誕如謂無意之妙非意之所能為故聖人貴忘之類亦頗涉虚無至駁伊川説春秋災異一條欲破董仲舒劉向劉歆之説遂謂天道不闗於人事尤為紕繆其他辨詰先儒之失抉摘𫝊註之誤詞氣縦横亦其剛狠之餘習然頗有剖析精當之處亦不可磨五卷以下皆論時事率切中明季之弊故明史稱其練習政體有經濟才一書之中葢瑕瑜互見如其為人云乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀本語自序予嘗有言曰天理不外於人情然聖人以人情爲天理而後儒逺人情以為天理是故聖學湮聖化窒夫事有本情而人有本心出吾本心以發事之本情則議道而道不睽作之於事可推四海而準通千古而不謬何者天理人情固如是也故曰君子中庸又曰和夫中也者言乎其當也庸也者言乎其平也和也者言乎其順也皆本人情不逺人以為道作本語萬厯丙子五月十有三日中元山人自序
