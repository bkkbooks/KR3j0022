body:
  text: 本語卷三明髙拱撰問伊川云學者要不為文字所梏故文義雖解錯而道理可通行者無害也然否曰為文字所梏固不可强解亦不可夫學者將以學聖人也聖人之書必須潜心體㑹務得精微之旨然又須得其言外之意方可循之以入道若以解錯而道理可通者為無害則亦只是自家的說話於聖言何有問考亭云理㑹文字當如酷吏之治獄直是推勘到底如何曰酷吏鞫獄務在苛求無中生有深文羅織安能得人之情學者窮理正須虛心平氣以得精微之旨若有意深求定然執著强為貫通必至牽合過為分析不免破碎得其理者鮮矣正不可如此也敬軒真是壁立萬仞男子密察力行死而後已問伊川云人不可用影祭何如曰但得倣佛以時展對亦可少輸人子無窮之思有何不可曰伊川云只一髭髮不似已是别人大不便何如曰即無一髭髮不似豈真吾親耶亦用以寄人子之心云爾古人不以尸祭乎尸明是别人然乃以當吾親也而况親之影有得其倣佛者耶考亭因人求墓銘曰人既死後又要這箇物事作甚其人為善亦是本分事又何必須要恁地寫出此亦難說孝子之心固有不容已者只不虛說可矣若本有善亦不可不寫𫝊曰顯揚先祖所以崇孝也明示後世教也且以生平情性動容歷履筆之書而時接目焉亦自是孝子不死其親之意程朱大儒於後學有罔極之恩而子有駁正何也曰人安能每事盡善臧文仲不知者三固知善之多也恐人於其一二未安處皆以為安而不復致思則誤耳不稱善不勝稱也更宜知之問帝王之學與韋布不同然乎曰若然則必須還得帝王乃可為帝王之佐否則學既不同又安可以佐帝王理天下論道經邦宏宣治化乎夫自天子以至於庶人一是皆以修身為本故曰尹躬暨湯咸有一德學非有二也後世韋布之士徒事章句無復格致誠正修身之功齊家治國平天下之具故其為仕也下焉者惟知希世以茍爵祿上焉者亦不過隨才以立功名而龍德正中之人格心輔世之業不復聞矣乃不曰吾無學也而曰帝王之學與我不同豈不謬哉曰只為後世帝王知學者亦止為韋布之事故有是言謂不當同於韋布耳曰止知為君言學不當同於韋布而遂使韋布之學以為原不同於帝王顧得一邊顧不得一邊而乃立為之說亦禍天下之學者也吾心自有本然虛明平妥處乃不能反求任其昏塞却徒務口說依傍他人門户隨場悲喜以為知道良可羞也程氏云寧學聖人而未至不欲以一善而成名孟子云皆古聖人也吾未能有行焉乃所願則學孔子也學者不可無此志博學審問慎思明辨篤行聖人示人為學之目昭如日星學者但當循是以學則聖人之域可至乃舍此不務却只說誰家尊德性誰家道問學誰家知行合一彼可此否紛紛無已只鬭口語到底成箇甚學只為己心便虛氣便平志便遜學須是識其真心天理不外於人心只人心平處便是天理之公儒家有言只要成就一箇是而已夫是豈易成哉務以為孝乃非所以孝務以為忠乃非所以忠察理不精不能得禮義之中正亦只做得箇題目而已安能便是儒者有言雖無其事實有此理此亦大謬夫理也者事之理也既無其事理於何有蓋求其說而不得乃曲為之辭云爾也性具於心而貫徹於人倫日用之間非有定局比對配合一性專屬一倫也有子云孝弟也者其為仁之本與是仁在於父子兄弟也孟子云仁之實事親是也義之實從兄是也是義又在於兄弟也知禮樂之實知斯節斯樂斯而已是知禮樂皆在於父子兄弟也又云仁之於父子也義之於君臣也禮之於賔主也知之於賢者也是義又在於君臣而禮知在於賔主賢者也蓋隨在而言非有定局者然孟子只言仁義禮知而後儒加以信為五性遂以分配五倫如父子之仁君臣之義朋友之信似矣而禮無所歸乃屬兄弟知無所歸乃屬夫婦夫節文之謂禮豈獨兄弟有節文乎明通之謂知專屬夫婦益更無謂名曰貫通實則牽合制為定局滯天理之圓機矣大抵後儒絶好比對配合如五事之配五行更謬非仁無以敦其愛非義無以酌其宜非禮無以作其敬非知無以明其理非信無以成其實人倫日用之間無乎不有即父子之仁君臣之義朋友之信亦特舉重而言非各主其一專於此而不通於彼也仁為萬善之長孝為百行之源故仁必屬諸父子蓋無所不包也問朋友之倫何以配得君臣父子兄弟夫婦曰使無朋友講習則何以能明君臣父子兄弟夫婦之理而盡之四者之倫既由朋友而得固配之矣問天德曰無意無必無固無我天德也問王道曰無偏無黨無反無側無有作好無有作惡王道也理一而已得此之謂天德道此之謂王道聖人有為己之實學而禍福毁譽不與焉聖人有為國之實政而災祥不與焉問學曰去得一分己私便是一分聖學問治曰省得一件閒事便是一件治道問帝王以五德王天下然歟曰此術家荒唐之說君子所不道也曰程伊川云五行古人說迭王字說盡了只是箇盛衰自然之理也又曰五德之運却有這道理凡事皆有此五般一日言之便自有一日隂陽一紀言之便自有一紀隂陽如王者一代又是一箇大隂陽也唐是土德便少河患本朝火德便多火災蓋亦有此理朱晦翁云五運之說亦有理問取相生否取相克否曰取相生然事有適然相符者如我宋以歸德軍節度使即位即是商丘之地此火德之符也事乃與漢髙赤帝子一般不然乎曰不圖二先生亦惑於此也請為言其必不可信五行天地之所運也帝王受命而興於此何與而乃謂各得其一果何所據以何知之白蛇之事既詭商丘之說乃出傅㑹而河患火災傅㑹更甚且即如所言也則他代之興又皆以何物證之此其一也彼術家者流各持其說鄒衍主相克劉向主相生言人人殊自相矛盾是人為之說非天定之理也此又其一也且即以相生云伏羲以木德矣傳十五君合萬七千餘年皆木德也而神農以火德繼之傳七君合三百餘年皆火德也而黃帝以土德繼之乃黃帝子少昊則以金德孫顓頊則以水德孫帝嚳則以木德堯則以火德舜則以土德三代而後又皆合一代為一德欲為一代則一代欲為一君則一君分合任意誰為為之此又其一也周以土矣秦則以水土不生水漢則以火水不生火相生之說亦自抵牾此又其一也五行之運厥氣惟均非有所偏也乃伏羲以萬年計五帝以百餘年計夏歷年四百商六百周八百漢四百唐宋皆三百即享國之長者亦自參差至秦隋六朝五季則或數十年或數年而止然亦各稱德王何五德之運長乃如彼短乃如此若是偏歟此又其一也又如三國鼎峙五季雲擾同時並列亦皆一代之君也豈共一德歟抑一德而分用之歟抑各用一德歟抑亦五德之運至此斷歇而不續歟此又其一也由是觀之荒唐甚矣問堯舜之世五日一風十日一雨然乎曰此文談也只是風雨節寒暑時而已矣安得照數五日風十日雨乎若照數如此氣候亦不佳也人之有目者以為無不見也然必上有日月星辰下有燈火形形色色照燭分明開目即見之矣而遂專謂吾目之能照然乎哉使昏夜處暗室中即離婁何為夫人之有才者目之明也而遇時可為機㑹有合得以成功則有日月星辰燈火為之光也不然即負旋乾轉坤之具亦無施矣噫才之濟時耶抑亦時之濟才耶問廷陵方氏云目之精水也其光火也以水為體故其氣清以火為用故其氣明然歟曰非也火能發光不能受光水能受光不能發光目也者體用乎水者也受光而已不能發光安得謂以火為用乎問人覺不能先知而夢乃有先知者何曰先知神之為也人皆有神焉覺則目視耳聽手持足行神役於形散諸物矣安能先知寐則形不用事而神收於靈府完而不散虛而不塞通而不隔故其於情也有時而先知譬則人在室中雖所見甚明然囿於室焉室外無覩也超而登乎髙則固有見室中之所不見者矣神之用妙矣哉人知雞之鳴午不知午之鳴雞也兵家先聲而後實必是先實後聲乃可以先聲而後實蓋以實為聲人自畏之而可省於實若無實不可以為聲也末世人才常多智慧蓋困於心衡於慮而後喻操心危慮患深而故達也其小人則變詐百出不可方物矣問大臣進退之節奚若曰以道事君不可則止見幾而作不俟終日此大臣難進易退之節也曰其去國也奚若曰戀官之心不可有戀君之心不可無夫太行孟門畏途久涉得釋重負當如敝帚爾若乃君恩深厚倚任多年一朝别去遂恝然以忘情抑豈大臣之道歟故戀官者患失之鄙夫也恝然以去者小丈夫之悻悻者也然而戀官者常千百戀君者不十一豈無以戀官之心假之戀君者乎亦豈無以不戀君之心假之不戀官者乎二者難辨故世每以恝然而去者為髙有道之士殊不謂然戀官乎戀君乎此心自審自知不以語人固不可戚然於其中亦不可恝然於其外人謂弩之徑也而强弩之末有不能穿魯縞者焉人謂水之柔也而泰山之霤乃有穿石者焉好勝者必遇具敵兩戒之也一則曰好勝必遇敵不可好勝為也一則曰彼好勝者必遇其敵固有敵在爾不可與敵也問事二君者與事二夫者同乎曰不同也彼更二夫者非夫夫也殺其夫而乃以事之也是謂喪節失身猶非事仇也若夫事二君者彼戕吾之君破吾之國固所不共戴天者也而甘以事之是謂忍心之極不止喪節失身矣故更二夫者貞人之所不齒事二君者有道之所必誅瓠巴鼓瑟遊魚出聽伯牙鼓琴六馬仰秣有諸曰魚與馬非人也安能知人之音人非魚與馬也安能知魚與馬之能知人之音彼適而出適而仰也端為琴瑟乎則有不瑟而出不琴而仰者也又何居夫毛嬙之色鳥見而驚鐘鼓之聲馬聞而駭類殊性别不得以相通也而文家者流動通物於人豈不謬哉曰獺祭魚豺祭獸鷹祭鳥何能像人而祭歟曰王浚川云時也鳥獸魚多食不能盡狼藉而陳之如祭耳彼物也安能知祭其祖先兹言良是嵗甲戌野有虎一田夫惑於人不害虎虎不傷人之說往視之焚香稽首口致尊稱以為敬禮如此必不我傷也虎見遽爪之裂其面以死夫虎止知人為香餌乃又知焚香稽首之何為彼謂瑟之感乎魚琴之感乎馬亦田夫之見也亂臣賊子視天下之公議蔑如也亦言其利害而已矣司馬昭使成濟弒魏主昭聞佯大驚自投於地乃與其叔謀所以自飾者遂論濟大逆不道夷三族朱全忠使栁燦弒昭宗全忠聞亦大驚自投於地即如東都哭臨甚哀乃收燦斬之燦臨刑大呼曰殺我以塞天下之謗如鬼神何噫二逆至是乃始知乎然晚矣宋祖終不大用陶穀袖中禪位之詔露其謀也亦終不大用王彥升韓通闔門之殺著其迹也問先生直道而行赤心為國乃痛遭擠陷亦有憾於心歟曰時也勢結已成而乾坤崩裂吾皇幼冲人方利以為謀而拱確奉祖宗之法莫之敢易方先君大漸實哭奏榻前許先君以死誠見其勢則然不敢有其身矣乃旋遘陷以歸無所容死焉然此心不敢負死猶可見先君地下烏乎憾然則先生喜歟曰拱顧命之臣也憑几之語執手之托蓋諄諄焉拱也止此心不負耳固未有以副也止可死見先君地下耳固無以為復也徒全首領而已如先君何烏乎喜豫掌國子時助教劉廷膏舉其堂一士曰亓經綸者有孝行豫曰知之越數日復言豫曰汝以豫忘之耶固未忘也豫其問汝孔子曰孝哉閔子騫人不間於其父母昆弟之言夫孝行於家是黨族之所稱也而子之於亓也固四方之人也安知其孝曰本堂諸生之薦之也曰諸生之於亓也亦四方之人也安知其孝曰其行有述其邦大夫之禮之也有述諸生固見之耳曰諸生何由見之曰亓生持以示之者也曰豫固知亓生之示之也吾其語汝夫孝之道大人莫敢當也而發於真心無能自盡者焉故親在人稱孝惟有愧歉而已親殁人稱孝惟有悲痛而已惶惶乎其不敢聞也此孝子之心也而亓也張之以示人得非假孝以取名乎務名己非而在父母尤人心不忍假者也而忍以假焉則其得罪於孝也深矣而顧可尚歟且人之聞人之孝也乃不辨誠僞而輒崇尚之者非真崇孝也亦務為崇孝之名者也彼務孝名此務崇孝名相率而為僞者也而何可以為訓故吾取實孝也乃惡夫務孝名者不欲人之為也取實崇孝也乃尤惡夫務崇孝名者顧自為歟子休矣國子先生坐於退食之堂諸生侍先生曰小子來吾其問汝吾之為教也嚴乎寬乎有對者曰先生寬諸生感德而不能忘先生曰不然吾不寬也又有對者曰先生嚴諸生畏威而不敢犯先生曰不然吾不嚴也又有對者曰先生寬嚴得中先生曰不然吾不寬嚴得中也諸生惑請問之先生曰吾豈不自知歟而以問諸生者蓋試之爾而諸生未之達也吾其語汝夫寬施諸率教者也嚴施諸不率教者也何有定用使務為寬則固有不率教者焉不亦縱乎使務為嚴則固有率教者焉不亦苛乎使務為寬嚴得中則固有當全用寬者焉不亦失嚴之半乎有當全用嚴者焉不亦失寬之半乎故諸生全率教則全用吾寬全不率教則全用吾嚴率教者多則多用寬不率教者多則多用嚴又自一人而言始而率教則用吾寬繼而不率則用吾嚴終而又率教則仍用吾寬也始不率教則用吾嚴既而能改則用吾寬終而又不率教則仍用吾嚴也一分率教吾有一分之寬一分不率教吾有一分之嚴本質在人付之而已而我何與焉是之謂寬嚴適宜故吾未嘗不寬而不可以寬言也未嘗不嚴而不可以嚴言也未嘗不寬嚴得中而不可以寬嚴得中言也夫是以事無遺情而教無遺術爾小子固皆當仕有官職也寬嚴之理所當知者故特訓之小子志之爾漳水平濶數里遇漲急則舟難即岸多敗溺傷人豫為編修時起復北上至漳忽雨楫師請渡豫曰聞漳遇雨則漲漲則敗舟傷人今雨安可渡楫師曰無傷也豫問故對曰平漫之水焉能灌河灌河者山水也西為遼州之山山有大雨則山水傾注奔騰而下洶湧敗舟然必行日且半乃能至此小人止日夜候望遼山若今日遼山雨猶渡何者即水且未至也若今日遼山雨明日雖晴不敢渡何者水當至矣乃遼山昨日無雲今兹雨固漫平水耳焉能灌河豫曰有是哉遂渡嗟乎天下之事其亦若此也夫世乃有不為國之臣或謀利或規避害或茍且為謀不臧而敢於造釁公然為之以為終吾任固且未發也逮久而發則承其後者當之矣故常使人憯無辜之患而又敢於為今日之惡何者無辜之患人之貽於我者也莫可支也不亦憯乎今日之惡我且貽於人者也莫我及矣不亦敢為乎而當國事者又率茍且支吾了目前之事而不復究其端之所繇啓常使寃者寃幸者幸而國事日以壞是徒以今日之漲為可患而不計昨日遼山之雨也其於功罪之實逺矣其亦異乎楫師之見也已又曰為學亦然彼察理不精者眩於形迹未嘗不以今日之晴為喜而不知昨日遼山之雨也以今日之雨為憂而不知昨日遼山之晴也故多非禮之禮非義之義隆慶六年六月二十一日豫出京在良鄉縣夢一偉丈夫衣冠甚古貌莊而和弟子六七人侍側豫問從者曰此何人曰孔夫子子肅然起敬拜見之因問曰仁道至大夫子每教人以仁而不言所謂敢以請夫子曰只一㸃真心便是豫又問曰桃仁杏仁皆謂之仁謂其純然桃杏之理無夾雜也謂其根幹枝葉皆具無缺闕也謂其生生而不息也仁之在人亦若是歟夫子微笑曰然又良久乃覺謹識之本語卷三
