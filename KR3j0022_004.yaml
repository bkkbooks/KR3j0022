body:
  text: 本語卷四明髙拱撰楚莊王無災禱於山川曰此天亡我其説何如曰驕言也夫災而懼懼而修政則國愈治乃俗所謂因病求醫因醫致壯者也但人患不知故必災而始懼耳彼楚莊也既知其理矣則無日不懼無日不修政其機固在我也而何以災為乎災而後懼而後修政則既已災矣孰與夫無災而懼而修政之尤為得乎人以無病為安病而後謹固不如無病而謹為尤安也而乃以無病為不可豈理也哉故曰驕言也問藺相如完璧歸趙楊龜山曰趙社稷安危之機不在璧之存亡夫以小事大古人固有以皮幣犬馬珠玉而不能免者况一璧乎雖與之可也相如計不出此不出數年卒有覆軍陷城之禍徒以璧之為祟也其説何如曰此迂談也秦乃虎狼不吞噬不已即與之璧固能免乎且其併吞六國亦皆璧之為祟乎相如於此亦以見國有死士尚有不可奪之氣耳而豈為一璧哉太王避狄去之岐山之下蓋遷國以圖存也今必以太王律趙豈欲其與璧不免則棄其宗廟社稷而去乎秦并吞天下即去之何所邑何所避乎古云國君死社稷孟子亦云世守也非吾所能為也效死勿去趙當是時惟有死社稷勿去而已於必不可免之中而先與之璧以示弱則何為哉問世傳漢髙溺戚姬之寵遂欲奪嫡然乎曰此甚有説而後人不思也夫立嫡以長乃理之正茍非甚不得已必不可輕易以啓禍端然太王舍太伯而立王季文王舍伯邑考而立武王固自有説則以王季有聖子而武王有盛德也而况如惠帝之暗懦乎髙帝艱難百戰以有天下豈不自愛其國家而以一姬之寵遂欲奪嫡失天下心蓋有所甚不得已耳當是時帝及吕后年皆漸髙而新造之邦反側未定諸強功臣皆在列使帝后一旦去世太子臨朝固能安鎮而駕馭之乎未也觀後惠帝之動靜則可知矣而趙王類已故意屬之雖其幼然事體有定而吾撫之長任吾壽所至而隨以付之亦無可奈何矣其能保有天下與否尚未可知也而不有愈於暗懦之已見者乎此帝之本情也乃卒以四皓從太子遊遂以為羽翼已成難動矣蓋曰吾以太子暗懦也而人心乃屬之人心既屬則不可拂故姑不易耳夫今之不易也恐失人心也而昔之欲易獨不恐失人心乎蓋今有所見故耳此則羽翼者之欺帝而計成之者也使帝之始欲奪嫡果惑於戚姬之寵而不顧失天下之心也則又何有於四皓彼戚姬之寵既能移帝愛子之心又何不能移帝敬四皓之心乎帝之殺韓信也即其屬意趙王之心也以為信之才如彼其功名之心之盛如彼而太子暗懦如此若吾死而信在太子能安乎故必死信而後吾乃可以死此又其本情也帝為身後計無所出遂忍心於信使太子能英武如帝則信未必誅今以屬意趙王為真惑於戚姬是亦謂信之誅為真反也而帝之本情安在哉曰若是則周昌何為強諫張良何為為之羽翼曰立嫡以長理之正又况開國之君尤當為後世法昌亦只説箇正理良亦只了得吕后之托而已非能為漢深謀也彼惠帝之無子先死吕后之後死文帝之承統以衍漢祚之長皆天也非人謀所能及也昌諫良羽翼時能逆知其果如此耶惠帝死而假子立諸吕王漢祚幾移矣昌與良能預為計乎昔者紂之母生三子長曰微子啓次曰中衍次曰受德受德乃紂也甚少矣紂母之生微子中衍也尚為妾己而為妻而後生紂紂之父紂之母欲置微子啓以為太子太史據法而爭之曰有妻之子而不可置妾之子紂故為後乃遂滅商夫惠帝無子先死吕后後死而文帝承統以衍祚也則昌之強爭為有名良之羽翼為有功若使吕后先死惠帝獨在位不能自立以喪天下則昌之諫良之羽翼亦太史之爭而已矣或曰太子易則強悍之吕后不肯但已趙王亦未能安家難且作而其禍方長故不如據正理以聽天命良之意或出於此曰亦是乃亦不得已為之但謂其為萬全之謀則未也問沙中偶語何以知為謀反又何以必見而後言曰此子房因所見以啓漢髙令其早賞以安人心耳若偶語果是謀反則子房安得聽之豈預知其所語是謀反耶蓋因諸將士素有不賞之嘆因見偶語則以平日之心度之當是謀反欲漢髙早處以了此事耳問漢髙殺丁公溫公極贊美之然歟曰丁公誠可殺誠可為萬世賣主者之戒乃漢髙之殺之也則亦任其殺之而已若遂以為美談則非也何言乎曰丁公為羽將賣羽使失天下大不義當誅然使羽能誅之雖百斬無過也漢髙既乞命其人以有天下矣而乃又殺之乎曰以大義胡不可曰漢髙豈端為大義哉不過假大義為名實則利心行計耳楚人有兩妻者人誂長者長者詈之誂其少者少者許之居無幾何有兩妻者死客謂誂者曰汝取長者乎少者乎取長者客曰長者詈汝少者和汝汝何為取長者曰彼居人之所則欲其許我也今為我妻則欲其為詈人也夫急則乞命於人惟恐其不賣羽以活我也既得天下又恐有賣己以活人而敗我事者遂殺其人以為永戒而又借以大義之名蓋一人之身而三取利焉亦狡矣昔有證父攘羊者以為直父以攘羊獲罪則又請代父之罪以為孝孔子曰異哉一父也而兩取名漢髙之事有類於此夫取長者得矣而誂人之妻可乎斬丁公得矣而乞命於丁使之賣主何為哉當是時不知有大義乎既已云云乃又云云狡矣若誠為大義彼丁公特一戰賣主耳而始終賣羽使失天下者無如項伯項伯尤當斬也故曰髙帝非為大義乃利心行計者也或曰勾踐之誅宰嚭不同乎曰不同也勾踐家破國亡故曲身以結宰嚭其結之之心即殺之之心也若髙祖之始遇丁公則只求生而已矣問伊川云周勃當初入北軍亦甚拙何事令左祖則甚如右袒後還如何當時已料得左袒又何必更號令如未料得豈不生變只合驅之以義管他從與不從其説何如曰此不得其情夫勃之此舉乃計耳而後人未識得請言之曰雖天下至惡之人大逆不道而其形未著有從而問之者曰若從逆否於是顯然承伏世必無其人也則軍中之必無右袒可知己雖天下至惡之人大逆不道而其形未著有從而問之者曰若從順否於是不以承伏世必無其人也則軍中之必皆左袒可知己况今日之域中誰家之天下光天化日六軍皆集而太尉臨之於上為順為逆死生禍福立見於前其事幾何如者而軍中顧敢有明為右袒者耶夫左袒右袒舉手即為之固至易事也以至易之事又令其自為而以決至大之隱情豈非天下至愚乎且即左袒未必即為劉也即不右袒未必即不為吕也亦姑以應之而已而遂以信之豈非尤天下至愚乎漫以為之則迂謬而無當謂以審其向背則觀望而不忠皆人所甚諱也而太尉白眼為之公然而以為言豈其夢耶嗟乎兵以計勝大尉此舉固自有意非作事果如此也何者祿産為亂諸軍從之久矣祿産既誅彼方懷懼於是而率之以誅諸吕彼必曰諸吕未滅姑緩我耳誅諸吕後必且窮搜我也其心如此而吾乃與之舉事則其中當有變當是時欲明言赦其反歟然反形未著吾乃明言其反而赦之則彼愈疑而為懼愈深欲不言歟則彼猶夫疑猶夫懼也故以號於衆曰左袒者為劉右袒者為吕蓋計其必左袒也而使皆得以形迹自見吾乃可因其迹而信之而其疑懼可釋卒之果皆左袒於是遂明言曰皆為劉無為吕者也吾可與誅諸吕矣而諸軍者亦皆釋其疑懼欣然以為劉自慶即歸而語其妻子亦必曰吾皆為劉者也豈為彼吕哉於是反側皆安而誅諸吕果濟事蓋初左袒時非皆真為劉也既左袒之後則遂皆為劉者也初不右袒時非皆不為吕也既不右袒之後則遂皆無為吕者也而太尉獨心知之泯於無迹作事在此取效在彼人不得而識也而後世徒據其迹議之云云失之逺矣且人臣之為國也將以濟事也若曰吾只驅之以義管他從與不從則是吾只作箇題目管他濟與不濟也而可乎問漢武輪臺之悔致堂胡氏謂人之壯也猶能自強及血氣既衰則難於刻勵而以武帝之悔為尤難然歟曰不然也武帝雄才之主平生多不羈之謀蓋自負其才俯視千古以為吾之所為當無不遂者也而至是七十有五矣征四夷歟所征安在而國已空求神仙歟所求安在而身已老頽景既促往事成虛所為之不效可見者如此矣且姦人搆禍太子死讒歸來望思悲涼無那事窮心折追往嘆來故自悔耳蓋苦無聊賴之後而當其言也善之時也若使前路尚多志無灰沮則尚冀所期之有遂未必悔矣故知老而有悔者乃人情所至壯而知悔者惟志士為能老猶易壯為難也易曰君子進德修業欲及時也夫悔過及時則補過有日老而空悔何嗟及哉雖然一旦盡改所為而明其過於天下亦自英雄之事視彼齷齪者流怙終以死者何如哉故武帝此舉足可稱賢但惜其晚耳問新莽之時何獨揚雄為劇秦美新文貽譏萬世曰史稱頌莽功德者四百八十餘萬人豈四百八十餘萬人者皆親至殿廷以口説頌之而去哉固皆形之文字也但不傳耳雄有盛名故其文獨傳而後世遂以為獨雄為之其實不止雄也曰然則不可罪歟曰正不須責古云放飯流啜而問無齒決使雄能見幾以去不仕莽朝而却為此文則可以文罪之雄仕莽既失身矣又何須責其文字即無此文猶夫失身也譬之婦已失節而乃責其言語動止之不善即言動皆善猶夫失節也噫雄學聖人之道者也我不意其學聖人之道而乃與亂世之四百八十餘萬人伍也我不意其學聖人之道而乃與喪節之婦伍也噫問三國人才可與權是一時風氣生此等人才否曰非也乃時之使然也彼三國鼎峙互相吞噬存亡之機間不容髮機一錯即為人所魚肉故其君臣相親相結不自疑阻幾合即為弗徇形迹有不必告於君者有不以語於人者蓋謀有所不可泄時有所不可失也期於濟事而已故可與權且其人便習既久智愈出而愈不窮不惟自家機熟而人之肯為謀者日益衆故止見其多才耳逮夫承平既久法之把持日以深忠謀者君不為主而旁人之苛求又甚烈故人皆務為形迹非得令不敢行非有故事不敢行非標表昭著人所共見者不敢行胡然而掣肘胡然而獲罪用是謀臣逺避庸人則推委支吾茍利於目前習以成風所用之人不過如此雖有可權之才亦湮滅而已此所以無事而庸人盤據富貴而智士不得用一旦有事則束手無策而徒嘆國家之無人也問昭烈疾革謂孔明曰吾兒可輔則輔之如不可輔則君自取之先儒謂以昭烈猶不能無疑於孔明然否曰此昭烈肝膈之語非疑也若果疑之即為此言固能止其不取乎蓋當是時魏吳皆在國家存亡之機間不容髮固非置遺腹朝委裘時也昭烈意以吾兒可輔則輔之幸矣無容言也如不可輔必思所以為處茍無所處則國家非吞於魏即吞於吳而嗣子必為其所魚肉吾何以瞑目於地下乎吾之於君義則君臣恩則骨肉今此基業固吾二人之所經營也君自取之不為他得又吾所甘心者而嗣子得所依倚可不死於人手亦尚有利則吾乃可以死也若徒顧君臣之名義而卒不能保則何益哉昭烈之意固如此也如人有所愛物將死必貽諸其所厚者而使不為他得則其意乃安昭烈之心固若是而已問昭烈君臣曰昭烈之與孔明雲長翼德朋友而昆弟者也昆弟而君臣者也其交固其義重始終不相疑始終不相負後代此等君臣不可再見問昭烈大舉伐吳何如曰古云兄弟之讎不反兵而鬬不反兵者謂見之即鬬死且甘心不暇反兵計勝負也昭烈痛雲長之死故大舉伐吳以用兵言則失䇿以其心蓋不反兵之義也問孔明在隆中何以便知天下三分曰見得世上有這三箇人問酈生下齊七十餘城韓信以兵屠之罪不亦大乎曰此酈生之罪未可遽責信也何以故曰志在救世安民功無彼此此聖賢事也信一功名人耳安可以此責之當酈生之適齊也信方擁兵四十萬壓境而來所嚮無敵勢如破竹齊亦懼甚矣酈生假信之威乘齊之懼故一説而下之使非信且至雖百酈生其誰聽之哉則齊城之下固亦信之下之也乃賣信而獨勦其功以報沛公使信垂首捲甲徒然以歸信固能甘乎此所以蒯徹之計行而齊城屠酈生烹也嗟乎始欲賣信而卒自殺其身豈不愚哉然則當何如處曰善處己者必先處人若不能處人安能處己酈生之適齊也宜先詣信説之曰聞齊聞將軍至其懼將軍且不日下之矣雖然兵家先聲而後實食其願得假將軍之威乘齊之懼以將軍之命諭之令以城下果以城下則將軍傳檄而定以報沛公亦可大省兵力不者且進兵未晚於是乃之齊説之曰韓將軍擁兵四十萬壓境而來所嚮無敵勢如破竹齊城不日下矣雖然韓將軍不嗜殺人所為多屠戮者為其拒也君誠能以城降韓將軍必且撫慰之傳檄而定則君既不失富貴而數百萬之命亦皆可免其為利害不亦較著乎韓將軍有是心恐君不得喻故令食其來君其自為計不者吾且去韓將軍且至吾亦不復來矣如是則齊城必下於是乃還報信曰事濟矣齊始聞將軍至甚懼既聞將軍令其以城降也又甚喜今且下矣將軍可傳檄而定報沛公矣下齊七十餘城將軍之功也不用兵甲而以威聲下之功尤大也食其傳命而已庸何功如此則可以得齊可以免數百萬人之屠戮可以成信之功而酈生之功亦不為細不止脫於烹也此不惟事勢如此亦天理人情本當如此耳曰信以不忍而戮數百萬人固無罪歟曰胡為其無罪也酈生賣信激之而多殺酈生固可惡也今必痛責酈生之罪則信之恨氣自平恨氣平乃從而責之曰將軍止以不忍之故遂誅殺數百餘萬人豈不亦殘毒甚哉如此則信自當俯首聽服不待辭之竟也若不明酈生之罪以輸其怨而徒以責信之多殺則豈足以服其心哉此可為賣人而獵功者之明鑑也問盧懷慎何人也曰賢人也曰時譏其伴食中書惡得賢曰此其所以為賢也何以故曰懷慎才固不逮德則有焉人臣最防爭妬自古國家大事多因人臣爭妬而敗若使懷慎伴李林甫食也則不可以伴姚崇何不可之有崇救時之相也懷慎居其次使其起一私念曰彼崇何人乃處吾上而獨以功名顯於是凡崇所為必百計壞之又媒糵其短而中傷之則崇且身不保又何展其救時之略乎不然而又曰彼相吾亦相也彼以功名見吾奈何獨無可見者於是用其私意橫生旁出混亂天下耳目以掩人之善而揚已之能則崇動必有礙又何以展其救時之略乎乃懷慎自以才不及崇故事皆推讓而不專寧甘受無為之名而終不為撓亂使崇得以展其才以濟國家之事非夫有體國之誠意有忘己之公心何能若此則崇之有功於國懷慎亦與有也故曰弗如也吾與女弗如也才雖未及德固長也而時人特據其迹遂譏為伴食夫才不足者在君子則讓人在小人則爭妬試觀自古賢相在位居其次者能不妬不爭安心伴食如懷慎者幾則懷慎之品格可知矣又曰觀懷慎用人之疏可見其才位至宰相而家猶寒素可見其守薦宋璟輩可見其知人疾革宋璟盧從願往侯之臨别乃執二人手曰上求治切然享國久稍倦於勤將有憸人乘間而進矣公第志之將死之時而猶念國事若此可見其忠後果林甫用開元之政盡壞可見其先識凡此皆非徒伴食者所能為也本語卷四
