body:
  text: 本語卷五明髙拱撰孔子憲章文武蓋時王之法不可不守也今言治者正不可妄意紛更只將祖宗之法求其夲意所在而實心奉行之縱有時異勢殊當調停者亦只就中調停處得其當便是不可輕出法度之外啓亂端也此不惟分所宜然祖宗聰明睿知既邁倫夷而又艱難百戰以有天下苦辛備嘗經練久熟具所貽謀為法既審為慮更深固非後世踈淺之見所能及也夫豈可以一事之未便而遂乖天下之全圖以一時之未便而遽梗萬年之長計哉國家用人匪徒資治亦即以安天下之人也故大臣小臣分列上下散布內外又有士有胥史下至里社亦各有長多其等廣其途盡網羅天下之才而用之使天下之人茍有一長一藝異於齊民者隨其才之大小皆入吾之網羅彼其既入網羅則皆有事於所職不惟顧惜所有而又有所望於進取孜孜焉垂死而猶有歉於所期之未遂故無暇於為亂且等既多矣途既廣矣於是而不在網羅則至愚下之人而已矣至愚下之人安能為亂即為亂亦易撲滅而天下常可得安此英雄御世之微機也末季之世不知此意不以爵祿收拾人才乃徒用奸巧之人甘其諛佞徒用庸陋之人樂其委順彼其盤據要津不止壞國事塞賢路每每惡直醜正摧折天下之才以快其忮毒使人抑閼寃憤無所控訴激而不堪之甚則黃巢之事所由起也且如元末兵亂朝廷更無可用之人則宜其世之無人矣我聖祖時佐命元勳固即元之人也使元能收拾縻以爵祿則才不在下安得敗亡至此是可不為永鑒也哉天變誠可畏然天心仁愛人君亦是曲說求其理而不得則亦不之信矣今只云天災流行禍亂將作必須謹修政事愛恤人民以保固國家則災可無害不然將不可救藥而禍亂成矣此自實言自可使人君知懼朝廷之上不可無忠誠剛正逺識之重臣彼其氣有夙養可以當大事而不懾謀有預定可以平大難而不驚猝遇緩急國有所賴以為安人有所仗以無恐若徒以奸巧窶細之人充揆宰鈞樞之任無事則結援蔽主倚勢作威自以為可震四海一旦有事顛頓倉惶神奪氣喪計無所出賣國從逆之事皆為之矣鄙夫可與事君也與哉亂不起於亂必有其幾聖人當休否之時已謹苞桑之戒幾未動而先圖所謂制治於未亂保邦於未危者也次之則亂幾有動能早識而亟圖禍即可弭力亦甚省又次則亂形已出而後救之然亦必得撥亂反治之才竭力劻勷僅而可免若至已亂則善者亦無如之何矣故治亂之幾不可不深察也然惟有道之人能察之彼庸人者流燕雀處堂棟宇將焚猶栩然以為樂而方笑聖人之過計可與言哉紀綱之壞莫大於國是之不明尤莫大於上下䝉蔽而人主終於不知夫國是不明則奸臣舞智以愚人邪臣黨比而醜正亂之道也然有時而明國法有行焉則猶可以為戒若上下蒙蔽而人主終於不知則舞智者恬焉得計黨比者敢於效尤襲為故常無復有發覺之者於是以威福為己物任其播弄必至於亂而後已考亭先生曽云吕微仲范堯夫為相用調停之說兼用小人更無分别所以成後日之禍如王安石罪既明白後即加罪於蔡確之徒論來安石是罪之魁首却於其死加太傅及贈禮皆備想當時也要委曲周旋他如今看來這般却煞不好要好便合當頭白其罪使人得知是非邪正所謂明其為賊敵乃可服須是明顯其不是之狀若更加旌賞却惹得後來許多羣小不服看來天下事須是先論其大處如分别是非邪正君子小人端的是如何了方好於中間酌量輕重淺深施用此言良是今觀當時今日紹述明日調停只在朝廷上混亂不了皂白無辨國事盡隳迄至靖康而後已有國者豈可使時事一至於斯帝王創業垂統必有典則貽諸子孫以為一代精神命脉我祖宗燕謀宏密注意淵逺非前代可及聖子神孫守如一日治如一日猗歟盛矣逮我穆皇未獲有所面授我皇上甫十齡穆皇上賔其於祖宗大法蓋未得於耳聞也精神命脉既所未悉將何以鑒成憲繩祖武乎今日講經書後又講貞觀政要等書臣愚謂宜先知祖宗家法以為主本而後可證以異代之事不然徒說他人何切於用乃欲於祖宗列聖實録所載聖敬事天之實聖學傳心之法如何慎起居如何戒嗜欲如何務勤儉如何察讒佞如何總攬大權如何開通言路如何進君子退小人如何賞功罰罪如何肅宫闈如何御近習如何董治百官如何安撫百姓如何鎮撫四夷撮其緊切編輯成書進呈御覽在講筵則日進數條在法宫則日披數段庶乎祖宗立國之規模保邦之要略防微杜漸之深意弛張操縱之微機可以得其大較且今日之域中祖宗之天下即以祖宗之事行之今日合下便是不須更費商證而自無所不當我皇上聰明天縱睿智日開必因而益遡祖宗精神命脉所在以覲耿光以揚大烈以衍萬年無疆之祚者將在於是則特為之引其端焉爾是臣愚犬焉之心也方遂請之而遂以廢去特述其意於此倘有取而行之者則犬馬之心亦自可遂不必出自我也宰相天下之樞必得心術正德行純識見髙力量大學問充經練熟者方可為之若不試以事徒取文藝不揀其才徒俟俸資則豈能遂為百辟之師平章軍國重事而無舛乎格心有根本有功夫有機括有次第不在諫諍上也還不在言語上也還不在形迹上相業無迹其格心處君尚不知人又孰得而知之後人不在心上做只務形迹不在君德上做只論事功故相業鮮致君以格心為本格心以誠意為本今日輔德之事全未且莫說朝夕納誨格君心之非即平日何曽講論箇道理商量箇政事縱緊急不得已事亦只劄子往來而已書既不能盡意而又先經內官之手拆視而後進上機密之言如何說得君臣道隔未有甚於此也然事須面議乃得其情而面議不得開端不止內官不樂人主與大臣說話恐破其壅蔽而輔臣亦不敢苦請面對若忽然問一件道理未必能知問一件事體未必能處原無本領當面說箇甚所以亦不樂於面對也輔德輔政平章四海只是至誠則得不然皆無有矣聖祖罷丞相分其權於六卿而上自裁決成祖始制內閣以翰林官七人處之備問代言商榷政務極其寵密然未有平章之任也嗣後遂理機務庶政比其久也則遂隆以師保之官稱輔臣焉雖無宰相之名有其實矣然皆出諸翰林翰林之官皆出諸首甲與夫庶吉士之選留者其選也以詩文其教也以詩文而他無事焉夫用之為侍從而以詩文猶之可也今既用於平章而猶以詩文則豈非所用非所養所養非所用乎舊制固不敢議而就中有以為之處焉亦無不可者誠宜於其選也必擇夫心術之正德行之良資性之聰明文理之通順者充之而即教之以翰林職分之所在如一在輔德則教之以正心修身以為感動之本明體達用以為開導之資如何潜格於其先如何維持於其後不可流於迂腐不可狃於曲學雖未可以言盡然日日提撕日日聞省則必有知所以自求者矣其一在輔政則教之以國家典章制度必考其詳古今治亂安危必求其故如何為安常處順如何為通變達權如何以正官邪如何以定國是雖難事事預擬亦必當有槩於中也於是乎教之以明解經書發揮義理以備進講教之以訓迪播告之辭簡重莊嚴之體以備代言教之以錯綜事理審究異同以備纂修而應制之詩文程士之文藝在其後焉面命而耳提之日省而月試之養之既久則拔其尤者留之翰林既留之後仍以舊業日加淬勵閣臣時時督課與之講論試其所有之淺深觀其行履之實否比其久也則又拔其尤者而登用之如此庶乎相可得人相業必有可觀者翰林庶吉士固未嘗不可也今也止教詩文更無一言及於君德治道而又每每送行賀壽以為文栽花種栁以為詩羣天下英才為此無謂之事而乃以為養相材逺矣閣臣用翰林而他衙門官不與既未經歷外事事體固有不能周知者而他衙門官無輔臣之望亦不復為輔臣之學此所以得人為難也今宜於他衙門官選其德行之純正心術之光明政事之練達文學之優長者在閣與翰林參用之如吏部必用翰林一人者然恆有其人繼繼不絶庶乎外事可得商榷處得其當而無舛而他衙門官有志者亦肯習為平章之業就中又可以得人也然此亦有先朝故事如李文達薛文清者皆自他衙門入便以為例有何不可雖然必是當國者訪用惟公鑒别惟明乃可為此事不然亦止濟其私而劉宇曹元入之矣或曰古云立賢無方故太公用於磻溪傅說舉於版築蓋通天下而用之也而子獨拘之於翰林之間廷臣一二之內不亦狹乎曰此别有論今只就國制中為之處耳程子云居今之時不安今之法非義也若論為治須於今之法度內處得其當方為合義若須更改而後為則何義之有人徒曰用賢才而不知賢才必須培養於先俟其成而用之乃可以濟天下之務若不待其成而用未有不僨事者此非才之不美也茍為不熟不如荑稗雖種之美者而亦不可食也國家用人必循資次固不可違然處之有道亦無不可蓋用人不在用之之日必須預為之計官之職事不同人之才器不一今於緊要之官各預擇其才之宜於此者每三二人置諸相近之地待次為備一旦有缺即有其人庶乎不乏不然則天下雖有其才而資不相及逺不可致安得輳用乎此惟有為國之心者可與言之今有百鎖焉亦有百匙焉各尋其匙而投之無不利者若以為鎖固在此匙固在此也而槩以投之則鎖與匙俱壞夫官各有所事而人各有所長以所長治所事則人既得展其能事亦可底於績茍用違所長未有不敗者矣今天下非無才也而事功不興者鎖匙之用背也然匙固在鎖固在也才德兼者上也有根本而才氣微者次也有才氣而根本微者又其次也然皆不可棄以才氣勝者用諸理繁治劇以根本勝者用諸敦雅鎮浮若夫鈞衡宰制之任必得才德兼備之人而闕其一者斷不可以為也今人只用形迹更不察實故有務為夙夜奔走之狀以為勤者然有益於事則鮮務為慷慨憂時之說以為忠者然有濟於事則鮮夫無益於事勤於何有無濟於事忠於何在若在上者惟要諸有益於事者為勤有濟於事者為忠而形迹不得以為溷則務實者既可以奏功無實者亦不敢增擾國家倣虞廷之制文官三年考滿三考始論黜陟然朝覲考察既有所汰而在任又有死亡丁憂事故去者則安得便有九年滿者補之故後又有推升之例推升之例行於是九年考滿者鮮矣然前朝官尚久任三考尚有其人又後久任之法不行固有未及三年而升者焉又有升未三年又升再升者焉蓋四五任未一考而况三考乎其九年考滿者間見翰林史官衛經歷等而餘不復聞然亦止有升而無黜是考績黜幽之典廢此考察所以不能無弊也然法不能無弊而行之既久其弊更不可勝言乃遂襲為故套無復置議者此士風日敗而治理所以不興也自今言之以六年之官而考於三二人以六年之事而核於三二日則豈能得其善惡之真所以毁譽肆出飛語中傷而行事者遂以為據大奸任其彌縫小過取以塞責十分曽無一二之實此一弊也六年之間其考滿者率加以美辭又數升遷有至二三品者而考察之時乃又以原官指摘而黜謫之夫使其不肖固當處也乃何故加以美辭又數升遷既加美辭數升遷乃何又以原官黜謫之先後不一自相矛盾非所以示勸懲於天下此又一弊也每考察時所去之人前後不相上下其數未足則必取盈其數已足即不復問天下豈有六年之間不肖者皆有定數其為茍且了事可知此又一弊也考察各衙門皆須有人如此衙門已有人矣遂不復動曰難為他衙門也如彼衙門無人亦必以人實之曰奈何空此衙門也夫考察本為去不肖也使不肖者多不妨盡去無不肖者不妨不去而所為乃如此徒使不肖者徼數多之幸而賢者受輳數之苦此又一弊也惟其如此遂使考察之時不肖者造作言語鼓弄風波傾陷善人以圖衙門有人而可以免已其善者則畏縮而無以自藏蓋非惟不能去不肖而尤以長人不肖之計傷賢者之心此又一弊也被黜者既不許辨科道糾劾不公之例又復不行遂使權奸於此行忮害之毒以為此乃死局禁錮終身者矣乃以平日所憾所忌所異己者推入其中使抱沒齒之恨而不得再見天日以此人視考察如必不可脫之囹圄如萬丈必不可出之陷穽惟恐推其身於此蓋曰平日之蹭蹬貶黜猶可言也一推身於此則不可言也而承奉權奸無所不至惟恐少忤其意而施毒於此焉是以朝廷疸惡之條徒為權奸作威固黨之具不惟臨事行其傾陷之計而平日猶持此以為嚇制之機使朝臣垂首喪氣無復志節皆由於此此又弊之大者也嗟乎其弊一至於此乃國家亦何利而為之今宜以黜汰之事令考功司河南道行於三六九年考滿之時於理為得或曰祖宗九年議黜三六年不為早乎曰九年者既百無一人焉而三六年又不議黜將遂無黜陟之典乎且考察有不一載而去之者矣三六年議黜不猶愈於不一載而去之者乎且彼一人也考功一司官考之又總之於堂上河南一道官考之又總之於堂上耳目既多實自難掩又非一日而了乃得以從容體訪審核是以衆人而考一人以數時而完一事復者復升者升黜者黜謫者謫事自精確必不至於虧人而是非大相逺也蓋考察略而考滿詳考察粗而考滿精考察曖昧而考滿明白考察匆遽而考滿從容較而言之自知矣然又有未及三六九年考滿而改節恣肆者則考察亦不可無但不必定在六年只偶一為之去其太甚者數人示戒而已其有被害虧枉者許人指言研審得情仍為昭雪庶小人不得施其溷飛語不得遂其讒奸人不得終其毒日日考焉惡者不得徼六年之幸人人自考焉善者不至恐輳數之及何不可者獨奈何必舍精而事粗舍詳而事略舍明白而事曖昧舍從容審核而徒事於匆遽鹵莽者也大明㑹典凡官員任滿考核及朝觀考察各有定制若因事考察間一舉行無常例然在國初未有也正統元年始奏准兩京五品以下官員從本衙門堂上官考察如有不才及老疾者本部驗實具奏定奪景泰三年奏准六部等衙門堂上官考察各屬主事等官才力不勝者降典史老疾官冠帶致仕天順八年奏准本部都察院㑹同內閣考察在京五品以下文職並在外布按二司官有不公者許令科道官指實劾奏南京各衙門照例考察有不公者令南京科道官劾奏成化四年令兩京文職堂上官曾經科道糾劾及年老不堪任事才德不稱職者各自陳致仕取自上裁五品以下官本部㑹同都察院及各堂上掌印官公同考察年老無為貪浮酷暴者革職𢎞治元年令兩京五品以下官照例考察其被黜之人有造言生事托拾妄奏者發遣為民十年令兩京官照例考察然皆十年一行亦未有一定之題目一定之處分也至𢎞治十七年始令六年一次考察遂至今為然然事例有八目四科曰貪曰酷為民曰不謹曰罷軟冠帶閒住曰老曰疾致仕曰才力不及曰浮躁淺露降調外任法可謂密矣乃行事者不體朝廷之意而皆襲為含糊曖昧不明之說曰貪而已更不列其貪之狀曰酷而已更不列其酷之狀曰不謹而已更不列其不謹之狀餘皆然徒加之名不指其實不止罔者無以壓服其心即當其罪者亦無以壓服其心何者未有以明之也然此有二弊焉訪之不的知之不真若明指其實則不符者多矣此其一也內閣部院之臣於內有所私意中傷若明指其實則必將以無作有以輕作重私害昭然在人矣此又其一也夫是以止加空名而不指實事使天下徒有駭疑而不得其故言官縱欲指摘而不得其端遂茍且了事之圖泯權奸傾陷之迹便己以殘人假公以威衆莫甚於此也而朝廷法度可如是舉行天下人才可如是摧折乎今誠宜於考察時令部院官務核名實某也貪必列其貪之事某也酷必列其酷之事某也不謹必列其不謹之事餘皆然明言直指與天下共罪之而又申飭先朝有不公者科道指實劾奏之例則庶乎私意中傷者不敢公然肆其所為而其平日體訪亦必務詳慎的確不敢鹵莽塞責以自取罪戾斯不惟於懲汰不肖之中存愛惜人才之意而公道昭彰人知勸懲治理其可興矣國初外官除朝觀考察外又令御史按察司巡撫及吏部差官㑹同考察在洪武永樂洪熙年者各一宣德景泰年者各二法各不一乃後亦不復行𢎞治六年考察奏上詔考察官員未及三載議黜者非有實跡許復任或以澄清或以愛惜意可想見今只以朝覲考察付部院行之無復朝廷裁處者矣朝覲考察天下官員皆是藩臬及府官面說各屬賢否而去留之豫辛未典其事見說事者多不審確每不合者必呼其人至前數其罪狀而黜之率皆承伏無辭蓋豫體訪既久參伍又多故頗有以得其實而明言之而上司者多不知也以此知上官於所屬賢否亦甚浪然因又以知前此司考察者率含糊了事只憑兩司說罔所駁正噫此天下大事也必須明言其罪乃可以服其心乃可以風示天下使知廟堂自有明鑒有司者既不敢肆其惡而上司者亦不敢肆其欺庶少得朝廷考察本意顧可草草然哉考察投匭其私更不可言夫投匿名文書律有重禁乃以科道官而可為此乎夫既不出名則一人而數十投可也而可遂以為公論哉此宜痛革只當各具訪單呈於部院㑹於都科則害人者不得行其計矣或曰如招怨何曰為朝廷官幹朝廷事得恤怨乎己務避怨可使天下無公道乎考察者不許辨是矣而行私害人者亦當處被害者亦當為之昭雪被劾者不許辨是矣而行私誣人者亦當處被誣者亦當為之昭雪如此方是大公之道皇極之言曰無偏無黨無反無側無有作好無有作惡王道也吏部每兩月一次推升天下府同知以下官員其事重大故事文選一主事管揭單單者一官一單書其年貫出身歷履資俸保薦有無考語美惡無所不備者也揭者查其資俸考語之當升者揭出以授郎中郎中呈之冢宰而定其升遷者也然獨一主事管之使主事而不公也可遂任之乎豫甚不然之且員外同司侍郎同部奏本皆列名而事則不許其知何居然此豈故為是密哉其中固甚有弊貪者通貨賄私者酬親故奉承者供權貴故惟冢宰與郎中自為若公於人固有所不便也豫更甚不然之乃遂改其事每當推升時令該司以天下官單俱送後堂二侍郎與闔司官吏公同查對揭其當升者付郎中以呈豫而定升遷蓋光天化日之下十目十手所共指視非惟人不得私即豫欲有所私亦不能也初司官以不便故甚難之豫欲參究乃不敢言而二侍郎亦力辭恐致司官之怨豫讓之曰非其職而强為者謂之攬權攬權固不可如其職屬當為而不為者謂之推委推委獨可乎且公大臣受祿厚豈以無所事事為稱職耶二侍郎不得已從之豫以為天下至公聖人復起必不易此矣乃豫歸而尚書缺者首變其事仍舊夫自私而變之為公也有何不可乃自公而變之仍為私也意欲何為乎而又嗾言官劾侍郎魏學曾攬權看單夫以吏部侍郎公同看吏部推升之單為攬權則必欲其尸位為可哉此事實豫所為魏又豫强而後可者而乃以受詆是豫之纍之也君子不以己纍人故特為白其事且當是時魏以正言忤當路意犯其深忌甚恨缺附當路故嗾言官劾之曰看單者借之為辭耳借之為辭而乃以天下至公之事為罪亦可笑也李吉甫為相謂中書舍人裴垍曰吉甫流落江淮踰十五年一旦蒙恩至此思所以報德惟在進賢而朝廷後進罕所接識君有精鑒願悉為我言之垍取筆疏三十餘人數月之間選用略盡當時翕然稱吉甫為得人夫垍非銓衡之官評隲人才者乃一問之間即疏得三十餘人又皆副用果何以能此哉固云精鑒亦素留意人才故也今雖銓衡之官日評隲人才乃一問之間能疏得三十餘人否即疏之能皆可用否官不久任必無善政然超遷之法不行小轉之法不革欲久任不可得也守令親民之官最為緊要使天下守令得人太平即此而在國初猶重此官進士往往為丞簿正官之重可知也乃今州縣正官皆以初仕者為之彼其民事既非素諳而守身之節愛民之仁處事之略漫無考證乃即授以民社待其敗事然後去之而民已受其毒矣後之來者亦復如斯是不以官治民而以民試官也是所謂美錦而使學者製之也且俗重甲科其非出諸甲科者禮待既輕前路又狹既多隳沮而所謂甲科者又多輕薄視民如草菅任情殘虐其間有稱善宦者亦民事未諳不過飾虛文以媚上為急政以徇名勉習時套以規進取而實政之及民鮮矣然又有少不更事取敗者及既知之則已為世所棄悔不可追矣此不止民不得被愷悌之澤而養之不俟其成用之不盡其才鹵莽而使之鹵莽而去之人才亦可惜也本語卷五
