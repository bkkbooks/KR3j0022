body:
  text: 本語卷二明髙拱撰聖人之道廣大而虚微圓通而變化如錘定秤不離於秤如珠走盤不出於盤心如天地而常小語該上下而常平聖人洗心而退藏於密故淵淵其淵而時出之聖人以翕聚為發散以專一為直遂聖人作事只在午前未午巳即收拾斷不至午而向昃也聖人以人情為天理後儒逺人情以為天理孔子不以無不言為直而以父為子隱子為父隱為直不以無不知為知而以知之為知之不知為不知為知斯意也後儒皆不能得陳亢謂聞詩聞禮則然謂又聞君子之逺其子也則不然夫聖人教人各因其才使伯魚而顏子也將不以告顔子者告之乎而何以逺為也亢始疑聖人厚其子終謂君子逺其子皆出有我之私不得聖人大公至正之理聖人之言近而逺易而難非惟精微之訓人不能得即至明淺者老師宿儒弗能得也何以見得曰只如史闕文君子於其所不知葢闕如也豈不至為明淺然乃學者不能得之孔子但言知仁勇一於理皆别言之不相聨屬中庸亦言知仁勇孟子始以仁義禮智言性而宋儒復以信足之曰寛裕溫柔足以有容也發强剛毅足以有執也齋莊中正足以有敬也文理密察足以有别也兹非仁義禮智之徳乎曰義者制事之宜發强剛毅只是箇勇字於義何干孔子只言五達道三達徳而宋儒以五徳言之遂使後人動則稱父子之仁君臣之義長㓜之禮夫婦之智朋友之信皆强合殊為不倫聖學於是乎裂矣天有元亨利貞人有仁義禮智宋儒遂合比言之殊不知正固之謂貞明通之謂智本非倫類安得比合予每為此言後見浚川亦言之乃知人心有同然者求寐無寐制於求也却思生思撁於却也夫無意之妙非意之所能為也故聖人貴忘問聖人之作用何如曰參耆養人用之不當有時殺人硝黄傷人用之而當有時救人固在醫不在藥也聖人明之至權之熟參耆硝黄隨手而用無不濟者後儒學不通方不能得聖人之權開口只説參耆必可用硝黄必不可用病且急立當一瀉而猶補以參耆以為必然無害卒斃其人而猶不悟也是聖人不止以救人之藥救人而亦每以傷人之藥救人後人不止以殺人之藥殺人而亦每以救人之藥殺人也烏能治國家問聖人之行曰聖人無跡人難測識何言之曰請以鏡喻夫古鏡多瘢瘢者銅之雜又歴年未甚逺渣滓未徹去盡也然有瘢可証人皆識其為古若夫銅之純潔而又年逺渣滓徹去盡更無瘢痕者則古鏡之上品也然無瘢可証世反疑之反不如有瘢者之易識彼皎皎之行有瘢可証世皆崇尚宜矣若夫聖人之道精微而中庸粹然其無瘢痕也自非深於道者其能識之哉家語多非孔子語也如矍圃之射形人以短非溫恭之度也儒行之對多所詡張非儉譲之徳也反袂拭面稱吾道窮非樂天之誠也商羊萍實證諸童子非博物之實也五行迭旺相繼而生是衍向之説也强越亂呉卻齊存魯是蘇張之謀也只觀論語則聖人之氣象可識矣問管寧華歆耦而耕田有金寧不視而過歆取視而棄之人以此為優劣然乎曰皆非也無足優劣夫貨惡其棄於地也不必藏於己今只不必藏於己而已棄於地何為曰當何如處曰拾之或有遺金者至則與之果其無也以周窮乏可也而不視何為取視而棄之何為酒亂性能使人顛頓失容人有惡其顛頓失容者則醉而矜持愈甚夫矜持愈甚可矣乃畢竟是為酒所使誠不若不矜持而自不亂者之為安也不視者矜持愈甚者也取視而棄者矜持未甚而不能自主者也皆知有金皆是為金所動固不若只以尋常處之而無所作意乃是不為金所動耳或問乎子陵曰髙士也而亦一節之士何以故曰光武中興之君非不徳也㓜同筆硯為天子而訪之數年於故舊良厚也乃一旦相見而張目以視咄唶其聲則何為者夫不受爵祿亦不受而已矣豈必張目以視咄唶其聲而後可不受乎葢其心實知有富貴以為富貴易屈人吾必不為所屈故持之太過而有此態是亦醉而愈加矜持者也若不知有富貴則亦處之泰然而已矣而何為是拂人情之狀乎曰何以知其心有富貴曰使光武不為天子而訪之數年而相遇也則亦張目以視咄唶其聲乎必不然也夫非知有富貴而何昔我聖祖微時與宜興一人友善既登天位訪之久不得一日其人擔鷄酒来謁聖祖喜甚命光祿寺治具與之飲食談笑因問曰欲官乎其人曰諾遂取金銀角三帯任其取乃取銀是時文輕武重乃授以正千户又盤桓數日其人乃去出則掛其帯於朝門莫知所之嗟乎斯人也情意篤實氣度中和而髙節自在其亦優於子陵也已問趙清獻之蜀琴鶴自隨其事何如曰此亦務為形迹夫鶴也驅之則不行舁之則以無益之物勞人既不舁行李乃又舁鶴何為果好鶴甚則行路不暇玩鶴也旣至蜀亦自有鶴何隨為故曰務為形迹者也問伊川與韓持國善因韓八十往見之久留潁昌韓早晩伴食體貌加敬一日韓有金藥楪一欲為伊川壽未敢遽言托子彬叔從容道意先生曰某與乃翁道義交故不逺而来奚以是為詰朝遂歸韓謂彬叔曰我不敢面言正為此耳再三謝過而别其事何如曰朋友之饋雖車馬不拜韓意誠懇委曲至此受之何害即不受遜以謝之卻之固由己也何為詰朝遂去豈以為不潔汚人歟又豈以為去不速則必為所汚而不得脫歟葢非所以待持國者矣令其何以為情問伊川先生云目畏尖物必須克治室中亦多置尖物令熟視之知其必不能傷人也則何畏之有此説何如曰目本畏尖物而令其不畏也何居豈欲視於尖物乎且室多尖物一身不便譬之鼻本惡臭乃室中多置臭物令其聞之熟而不畏也則可乎何以異于是問伊川云孤竹君事還是招叔齊而立之為當何如曰叔齊之逃也將何為者而招之肯来耶其必不來也則將何如處問伊川云陳恒弑其君孔子沐浴而朝請討之當時哀公能從其請孔子必有處置須使顔囘使周子路使晉天下大計可立而遂其説何如曰且莫説天子方伯不足與言請之無益是時孔子已老顔囘子路死已久矣又使何人此空談也問伊川云同姓相見當致親親之意而不可叙齒以拜盖昭穆髙下未可知也如何曰人之相見必有揖譲坐立必有左右先後若不叙齒又未知昭穆髙下則將孰左孰右孰先孰後乎將遂無揖讓坐立乎自不能通矣問魯兩生云今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起積徳百年而後可興也吾不忍為公所為其言如何曰兩生不知禮樂禮樂無一事可無無一時可無古之聖人躬蹈禮樂之實以化天下迨其既久禮之用行而樂之效達名分定風俗淳百姓泰和暨鳥獸魚鼈咸若是之謂興非謂百年之後乃始制禮作樂也如必待百年而後制作則漢已越髙惠文景武而之昭矣至此時方言禮樂乎則自是以前何以爲君臣何以為上下何以朝㑹何以祭享可漫無儀式而茍以為之乎孔子云王者必世而後仁夫所謂必世而後仁也者豈三十年後始修仁政哉行仁之久積至一世乃始淪浹爾兩生不達而為此迂談君子固無取也問伊川云夏近古人多忠誠故為忠忠弊故救之以質質弊故救之以文然乎曰文入於靡以質救之可也文何以救質質涉於偽以忠救之可也質何以救忠三代異尚理旣不然而相救之説又從而為之辭者也問孔子以前多聖人而後乃無之何也曰有孔子為之斷案故古多聖人揚雄有云伯夷栁下惠若無仲尼則西山之餓夫與東國之黜臣惡乎聞豈惟夷惠若無仲尼則湯武之心跡難明惡乎聖啓箕之異同難定惡乎仁不知天下謂之何矣後世既無孔子則雖有其人其孰能識又孰敢為之斷案夫是以未見有聖人也且後人未得聖人之道而好立言其言一定更不許人别有商量乃却不免執着迷聖人廣大圎通之旨有志之士纔説希聖已即囿於其中而不能出夫是以天下鮮聖學也湯武夷齊其趨不一然湯武革命應乎天而順乎人旣不妨稱湯武求仁而得仁又何怨又不妨稱夷齊上下四方各見其是此聖人之道所以大而通也若非聖人斷之於前而使後人言之稱湯武必貶夷齊稱夷齊必非湯武亦見其一隅而已伯夷不念舊惡非徒清也栁下惠不以三公易其介非徒和也人皆以國削為賢者之罪而孟子以國之得止於削者為賢者之功非聖賢劑量十分分曉安能看到這等田地後人雖當極敝必要萬全少有不然便加苛責故時值其易庸人髙枕以為功時值其難豪傑馳騖而獲罪揚雄不生新莽之時王安石不居宰相之位偉乎其儒也已故金必火而後知其精與不精刀必割而後知其利與不利宋儒窮理務强探力索故不免强所不知以為知自以為是居之不疑之病惟明道先生無之濂洛闗閩發明聖學以訓後世厥功偉矣然洙泗之淵源有在學者必求溯洙泗之淵源而參伍以濂洛闗閩之説則可若遂以濂洛闗閩為洙泗而不復知所求焉則亦不能入聖人之域也曰濂洛闗閩之於洙泗也不同乎曰堂序已窺而廣大虚明尚未得途徑不忒而四通八達則未能道者天下公共惟其是而已茍求諸心而果得則安敢㒺吾之心而隨人以為疑茍求諸心而果不得則又安敢罔吾之心而隨人以為信考亭極尊崇伊川然亦多所不合必為之明其理是以理尊崇之也尊崇以理其為尊崇大矣故君子於先儒之言其不可易者不可妄議其不能得者亦不可强從也後儒信道之篤者無如伊川先生然每事好硬説硬做故於聖人融洽處未之能得康節病革先生問之康節云你道生薑樹上長我也只須依你則其平日硬説硬做可知學者須學先生莊敬自持方能有立然尤須虚心平氣體玩聖人融洽處乃能成學不可只恁硬説硬做也問張子厚二十年學箇恭而安不成何如曰恭而安不生於恭而安必有所以為恭而安者只造道成徳到箇中和純粹之域便自能恭而安若特地只去學恭而安再二十年也不成問伊川之於明道也奚若曰明道粹和伊川義執晦翁之於伊川也奚若曰伊川身體力行晦翁語言文字較多問朱陸之於聖人之道也孰為得曰聖人之道如良玉然既精瑩又溫厚晦翁猶帯石意着而未融象山如水晶虚而不厚晦翁求聖人於魄不能得其神魯齋之學聖人也可與進何以故曰其心虚其氣平其志遜魯齋之於程朱也奚若曰魯齋極尊程朱而宗之然溫厚和平既不似伊川硬説硬做亦不似晦翁好勝罵人氣味勝焉問魯齋仕元有非之者亦有為辨之者究竟何如曰仕所以行君臣之義也學者只看箇君臣之義若乖於君臣之義也則不可然而宋自南渡中原已非其有先生生於金章宗大安乙巳是時金有中原九十有餘年矣以河内則金之南懐州也以新鄭則金之潁川郡屬也其父其祖固金之累世編氓也既變為元朝代又改身不生於宋君臣之義無屬焉仕元不仕元非所論也敬軒一字一句一步一趨皆確守程朱之轍固是篤信好學然升程朱之堂而不復求入孔顔之室故不能得聖人之大鮮超脱處曰其學之所至何如曰可與立晦翁真是强學猛進然自得之味却少鮮微言朱陸相攻謂何曰其所紀録皆門人鬭勝之過二公非如此也而亦不免各有勝心動氣處夫學求為己只當忘人忘己虚心以求其是人茍是便當從如其不是不從而已吾茍是便當守如其不是改之而已如果吾是而彼非的見其然不妨再告反復而不聽則姑已之俟其自悟可也何爭辯為明道先生謂吳師禮云為我盡達諸介甫我亦未敢自以為是如有説願往復此天下公理無彼我果能明辨不有益於介甫則必有益於我何等心平氣和不惟受益無盡亦自能感動人釋其勝心問王通續經後儒貶之至比之於僣竊其然乎曰孟子云服堯之服誦堯之言行堯之行是亦堯而已矣續經縱未如經亦是尊慕聖人竊比之意人不學聖人將奚學也而安得遂譏為僣使服桀服誦桀言行桀行謂之非桀可乎而朱子作綱目以續春秋將亦謂僣乎曰伊川云續詩備六代如晉宋魏齊周隋之詩又何足采然歟曰變風變雅言豈皆善而孔子收之用以見時事也夫茍用以見時事也則雖晉宋魏齊周隋之詩采之有何不可問伊川謂王通心迹之判久矣為亂道是否曰何為亂道夫堯之讓噲之讓可謂同乎微子之去箕子之奴比干之死可謂異乎禹稷顔子異地皆然伯夷伊尹栁下惠道不同而趨一心迹何嘗不判考亭謂王通之學只識得仁義禮樂有用處可惜不曽向上透一着於太極處有欠闕何如曰孔子只説易有太極一句堯舜相傳何曽説太極孟子亦不曽說太極豈皆不是學耶程門過貶王通考亭還説他好處多程門過貶溫公考亭甚敬他還是考亭是邵子超脫程子不與他言學他亦不與程言學雷從起處起亦是隨口漫應無甚深奥義理學者勿致惑焉溫公甚為二程所不滿此程氏門人抑揚太過之辭使溫公生孔子之世當亦取之縱使學有不同乃何至為二程不滿之甚乎子厚撤去虎皮亦似門人標榜夫説易不如二程服之而已何為乃撤虎皮學之髙下固不在虎皮設不設也恐亦非二先生所樂聞也由是觀之則記言之誤當亦多矣宋儒議論古今人固皆好善惡惡之心然却有作好作惡處愛而知惡惡而知美不以言舉人不以人廢言蕩蕩平平無偏無黨無作好作惡乃是至公本語卷二
