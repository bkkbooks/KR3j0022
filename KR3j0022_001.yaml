body:
  text: 本語卷一明髙拱撰問易泰否其義何如曰易為君子謀不為小人謀泰初九拔茅茹以其彚言一陽方長而衆陽隨以升也君子於此征則吉蓋進而行道故吉也否初六拔茅茹以其彚言一隂方長而衆隂隨以升也君子於此貞則吉蓋退而守其志乃吉也然不惟吉而亦亨不失所守則其道亨也泰不言亨而否言亨者泰進而行道則既亨矣不待言也否方退藏人不以為亨而貞則吉而實亨人不知也故特以亨言之志從君謂不忘君也若果於忘君往而不返則九四之際誰與濟否故身雖退而志則存耳此楊誠齊之說愚意正合乃謂小人能變而從君子夫小人果能變而為君子也則何否之有至於六二包承曰小人包容承順於君子六三包羞曰欲傷善而不能亦似未得夫小人之於君子何可以言包容君子顧為小人所包容歟若小人而能包涵承順乎君子則何以為小人君子而為小人所包涵承順則何以為君子包承者包藏而承順者也小人本狠惡之人若肆其狠惡凌悖無已禍必隨之矣今姑包藏其狠惡而曲意以為承順則其惡未肆雖是小人尚不至於有凶故曰小人吉也所謂小人之福者也其人者在昔日時包承也在今日包羞也不凶而已何以言吉曰小人凶理也不凶即其吉也包容承順君子則亦非小人矣包羞者可羞而包忍之謂欲傷善而不能愈大不類誠齊於六三云小人樂禍於己窮之後包羞忍恥以茍富貴而不忍去然不知其位之不當而身之將危也斯為得之蓋君子有不幸而無幸小人有幸而無不幸夫君子而通理所宜然非幸也有時而塞則不幸也小人而塞理所宜然非不幸也有時而通則幸也故小人無否而但曰吉幸之謂也大人則曰否不幸之謂也然而獨立特行道固亨也否亨即所謂貞吉亨也昔萬安結交宫闈擅權固寵蠧國害賢逮勢窮之後孝皇諭之意猶不肯去包羞也至令內官逼奪其牙牌不得已始告去途次猶夜望三台星明否冀復用可謂無恥之甚夫自君子言小人謂之包羞在小人則直甘心無恥而已矣非自知其可羞而包忍之也問伊川云四凶堯非不知其不善也但其不善伏則亦不得而誅之及堯禪舜位則四凶始懷憤怨不平之心而顯其惡故舜得以因其跡而誅竄之也然乎曰聖人公天下以為心可用則用可罪則罪亦惟其事惟其時付之而已而非有私也若曰知其不善即其罪未至誅竄亦必去之矣何乃忍留必待其僨天下之事罪狀既著然後因其跡而誅竄之乎因跡而後誅竄是後世人臣避嫌而務為形跡欲有辭於天下者之為聖人顧若是耶孔子始政即誅少正卯因何跡也後世但見四凶在朝恐傷帝堯知人之明故為之出脫如此然不知可用則用既不深求可罪則罪亦無留滯惟其罪之即罪是以用之即用而無所容心也無所容心正所以為堯舜而明知其惡姑為容忍必待其惡顯著而後因以誅竄者正不可以為堯舜也有天下者去邪勿疑無惑乎其說問伊川云伊尹知太甲必能思庸故放之桐三年當湯崩時太甲當立太甲又有思庸之質須立太甲若無是質伊尹亦不立也然否曰太甲當立自合立之豈為其有思庸之質乎至其敗度敗禮顛覆典刑乃放之於桐蓋甚有所不得已也使不能思庸必且别有處分必不使其喪有商之社稷矣此初放之時其機如此未知其竟何如也至其思庸乃即復之耳是太甲之立也以其當立而其復也以其思庸思庸也者乃是因放而思庸非伊尹初逆知其必思庸乃故先放之使之思庸而後復之也此說與堯非不知四凶同意其理不如此也問考亭云西伯戡黎事難判斷觀戡黎大故迫近紂都了豈有諸侯臣子而敢稱兵於天子之都乎看來文王只是不伐紂耳其他事亦都做了如伐崇戡黎之類若說文王才守臣節何故有此只是後人因孔子以服事殷一句遂委曲回互箇文王說教好看殊不知孔子只說文王不伐紂耳其說何如曰文王三分天下有其二以服事殷其中有多少道理多少忠孝多少誠心委曲只此便是至德又待何者而後為至德乎且文王既伐崇戡黎都做了矣乃不伐紂何為既不伐紂矣乃又伐崇戡黎都做了何為蓋文王為西伯賜弓矢鈇鉞專征伐則不道之國乃其所當伐也紂命西伯專征伐固未曰逺者征之而近者弗許也則西伯於此又安得獨征於逺而近者遂任其不道而不以征乎紂君也臣之所當事也崇黎諸侯也方伯所得征也使文王伐紂是賊君臣之義使文王不伐崇戡黎是廢方伯之職固各有所當也豈紂與崇黎皆為同列文王伐崇戡黎之事都做了只不伐紂乎固未可以並言也祖伊之恐而奔告也蓋乃臣子之心古云湯武雖賢聖不遇桀紂不王桀紂雖不肖不遇湯武不亡今以紂惡日甚而遇文王之德日以盛則興亡之㑹昭然可覩故祖伊因戡黎之事恐而奔告蓋恐紂之必亡欲其改過以圖存非謂文王將取天下而恐也觀其奔告之辭只稱殷之不德而曽不及周則其本情可知矣若曰文王伐崇戡黎都做了只不伐紂耳是謂曹操東征西討都做了只未取漢耳而可乎孔子何私於文王特為溢美後人何私於孔子曲為回互若以孔子之言未可信則天下更有可信之言乎考亭嘗謂學者看詳文字當如酷吏之鞫獄豫甚以為不然夫酷吏鞫獄無中生有深文羅織釘入人罪何以得其情之真學者窮理只當虛心平氣徐求精微之旨一有執著便錯若如酷吏鞫獄何以得其理之正今觀考亭此論其亦酷吏之鞫獄也己又曰武王繼文王為西伯戡黎者武王也紂使膠鬲觀兵膠鬲曰西伯何來蓋武王伐紂之時而先戡黎也此亦有據若然則文王之心事愈益明白使西伯而文王也則祖伊之恐徒以其理使西伯而武王也則祖伊之恐明見其勢可恐而卒不如所恐文之所以為文也可恐而即如其所恐武之所以為武也而考亭於武之伐紂則曰武王於此自是住不得於文之以服事殷却曰只不伐紂耳其他事也都做了是以文之不伐紂反不如武之伐紂為直截也失之矣問殷民曰以周之德而殷人猶思其主則殷之所感可知以思殷之人而卒化於周則周之所感可知在周如此在殷又可知殷人如此周人又可知吁殷周之德其可謂盛也已書注未善者多而洪範更甚如五行自五行五事自五事乃比而屬之曰貌澤水也言揚火也視散木也聽收金也思通土也豈不牽合無當乎稽疑曰雨曰霽曰蒙曰驛曰克謂雨者如雨其兆為水霽者開霽其兆為火蒙者蒙昧其兆為木驛者絡繹不屬其兆為金克者交錯有相勝之意其兆為土夫雨與霽猶略近似蒙之為木驛之為金克之為土也何居庶徵曰雨曰暘曰燠曰寒曰風亦配五行夫雨與暘與寒為水為火為金亦略近似燠何以為木而乃為木風何以為土而乃為土乎愈不通矣若謂範疇必配五行則八政五紀三德五福六極又何不分配之哉皇極注更不妥且不得其緒理皇建其有極謂為人倫之至斂時五福謂極者福之本福者極之效極之所建福之所集也用敷錫厥庶民謂人君集福於上非厚其身而已用敷其福以與庶民使人人觀感而化所謂敷錫也惟時厥庶民于汝極錫汝保極謂當時之民亦皆于君之極與之保守不敢失墜所謂錫保也言皇極君民所以相與者如此又下文其作汝用咎謂為汝用咎惡之人也愚皆不敢謂然夫人倫之至有位無位之聖人皆然皇建其有極者聖人在天子之位立君師之道以為民極也斂時五福者嚮用五福威用六極惟辟作威惟辟作福威福之柄大君之所操也皇建其極民既有所凖則矣於是乃綜攬嚮福之權而敷錫以為勸使斯民皆入皇極之中也有以勸之民固無不從矣然未必能守而不失故汝又有保極之道而錫之於民使其順且安焉樂於趨而服之無斁也此乃一章大㫖凡厥庶民無有淫朋人無有比德惟皇作極可見臣民皆則君以自治而君也者所則者也此皇之所以當建極也凡厥庶民有猷有為有守者汝則念之加之意也不協于極不罹于咎者皇則受之不棄絶也必其康色好德者汝則錫之福焉如此則人有所激勵而皆入於皇極之中然福以勸善勿論乎人之㷀獨髙明惟其善而已人之有能有為者使之進其行則賢才用而天下治邦豈有不昌乎然何以使之羞行凡厥正人既富方穀故必有以福之而後可與為善也汝若弗能使其有家則被罪且不能免矣其何以羞行而榖乎此福之所以不可不錫也然錫福必當而後可以勸而後為皇極之道若于不善者汝雖錫之福然爵及于惡德祿及于淫人以若所為不公不正有失皇極之道且為汝之過矣而况可以勸哉所謂斂時五福用敷錫厥庶民惟時厥庶民于汝極者此也民雖從善然或此入彼出未必大同始勤終怠未必有永故又以皇極之道敷衍為訓而振德之訓之無偏黨焉訓之無反側焉訓之無作好作惡焉惟大義大道大路蕩平正直之是遵而㑹且歸焉猶禹謨所謂勸之以九歌俾勿壞者也丁寧反覆教告諄詳布敷流衍使家𫝊而人誦不惟詠嘆淫佚有所感發興起抑且歡欣浹洽入之深而不自知囿於化而不復有所變是所謂錫汝保極者也如是則凡厥庶民自惟皇極之敷言是訓是行以近天子之光而親之為父母尊之為元后也蓋至是而保極之道得錫極之效著建極之化成矣伊川注春秋用功多然太著力却有穿鑿考亭不注春秋而其說春秋也却多平問春秋曰王者之迹熄而詩亡詩亡然後春秋作春秋天子之事也天子之事王者之迹也既熄而續之者也問春王正月端的何如曰春秋魯史紀實之書也春王正月乃開卷第一件事若以夏時冠周月則第一件事已自不實何有於他且春正夏五秋七雖無事必書時令重也若以夏時冠周月則至重之事已自不實又何有於他問魯侯爵稱公胡氏曰從周之文而不革也然乎曰周文安得有魯公魯之稱公也乃春秋舊文而孔子因之蓋從魯之文而不革非從周之文而不革也曰列國僣稱者皆革之魯何獨不革曰陳司敗問昭公知禮乎曰知禮及司敗指言其不知禮也則又直任以為過而終不明其說魯公之不革亦昭公知禮之意也問伊川云春秋書戰以戰之者為客受戰者為主以此見聖人深意蓋彼無義來戰則必上告於天子次告於方伯近赴於鄰國不如是而與之戰者是以聖人責之也然乎曰當時天子何如方伯何如鄰國何如告之顧能援我乎彼既不能援我乃必待告而後與之戰則國已破矣不責戰之者而徒以責受戰者聖人不若是迂也問伊川云春秋書災異蓋非偶然不云霜隕而云隕霜不云夷伯之廟震而云震夷伯之廟分明是天有意於人天人影響有致之之道也然歟曰天道逺人道邇災異本不可以事應言故春秋書災異不書事應乃其理本如此非聖人有隱意於其間也而後儒必以事應言之殊失聖人虛平之旨且不曰霜隕而曰隕霜不曰夷伯之廟震而曰震夷伯之廟分明天有意也乃世不曰雨下而曰下雨不曰雪落而曰落雪豈亦謂天有意耶問說春秋者有云危行言孫以避當時之禍故微其文隱其義然乎曰以微文隱義避禍是不欲人之知其義也則修春秋何為若謂後世必有知之者則當時亦必有知之者也則微且隱又何為問春秋於吳楚書子考亭云恐是吳楚當時雖自稱王於其國至於諸侯㑹盟則未必稱也然乎曰彼其强梁若是安肯於㑹盟不稱王且齊侯鄭伯等皆僣公矣而春秋書侯伯豈亦自稱公於其國與諸侯㑹盟則不稱歟或又曰周室之季吳楚可謂强矣孔子修春秋書荆以狄之雖其屢進不過子爵所以抑黜侵亂而使後世知懼耳然乎曰亦非也孔子安得黜其王而與之子乎然則何歸曰吳楚本子爵周之制也從其本爵尊周也别無他說問晦翁云向見沙隨春秋解只有說滕子來朝一處最好如隱十一年方書滕侯薛侯來朝到桓二年便書滕子來朝先輩為說甚多或以為時王所黜故降而書子不知是時時王已不能行黜陟之典就使能黜陟諸侯當時亦不止一滕之可黜或以春秋惡其朝桓特削而書子自此之後滕一向書子豈春秋惡其朝桓而并後代子孫削之乎或以為當喪未君前又不見滕侯卒皆不通之論沙隨則謂此見得春秋時小國事大國其朝聘貢賦之多寡隨其爵之崇卑滕子之事魯以侯禮見則所供者多故自貶降而以子禮見庶得貢賦易供此說恐是如此緣後面鄭朝晉云鄭國男也而使從公侯之賦見得鄭本是男爵後襲用侯伯之禮以交於大國初焉不覺其貢賦之難辦後來益困於此方說出此等話非獨是鄭想當時小國多是如此然乎曰此更不然滕本侯爵縱以子禮見安得遂稱子乎縱彼自貶為子也春秋又安得而亦子之乎彼僣公僣王者皆仍書其本爵豈以自貶者遂不書本爵乎且鄭男也而從公侯之賦豈遂自稱公侯乎春秋何不亦從而公侯之乎問孔子書八月大閲伊川云講武必於農隙魯之八月夏之六月也盛夏閲兵妨害農人故譏之然乎曰由此言之又非行夏之時也問孔子曰放鄭聲鄭聲淫乃朱子注鄭風云鄭衛之樂皆為淫聲然以詩考之衛詩三十有九而淫奔之詩才四之一鄭詩二十有一而淫奔之詩已不啻七之五是則鄭聲之淫有甚於衛矣故夫子論為邦獨以鄭聲為戒而不及衛蓋舉重而言固自有次第也安成劉氏則曰鄭詩之有緇衣羔裘女曰雞鳴出其東門數篇乃樂中之正也他如大叔于田及清人詩雖無足尚猶幸非為淫奔而作若叔于田則亦未免有男女相恱之疑是其二十一篇之中曉然不為淫奔而作者五六篇而已故曰淫奔之詩不啻七之五然自昔說詩者唯以東門之墠與溱洧為淫詩今朱子乃例以淫奔斥之者蓋即其辭而得其情正以發明放鄭聲之㫖不然則衛齊陳詩諸篇非無淫聲夫子何獨以鄭聲為當放哉其說是否曰鄭詩非鄭聲也鄭聲非鄭俗也孔子云惡鄭聲之亂雅樂夫鄭聲者鄭之樂也鄭聲雅樂皆言其音非指其詞雅為古調鄭乃新聲人多悅之悅之故能亂雅若以淫媟之詞歌於里巷者為鄭聲則明是狎䙝何能亂雅乎且淫媟之詞歌於里巷者固非所以被之管絃金石奏之宗廟朝廷者也則何謂鄭聲禮云鄭音好濫淫志又云宫亂則荒其君驕商亂則陂其臣壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也是則鄭衛之音之說也魏文侯問於子夏曰寡人端冕而聽古樂則恐卧聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏曰夫古樂和正以廣以文以武以相以雅君子於是語於是道古修身及家平均天下此古樂之發也夫新樂姦聲以濫溺而不止樂終不可以語不可以道古此新樂之發也今君之所好者其溺音乎夫樂者與音相近而不同此又鄭衛之音之說也惟其相近不同故似是而非能亂雅樂夫子所謂鄭聲淫者以此誠謂其聲調淫靡流蕩能散人之心志而使之懈慢故放之耳非謂其詞語之淫媟也而朱子乃謂淫為男女淫亂之淫而以鄭詩當之又於鄭詩詠他事者力改舊序而强解為淫奔之詩以合聖人放鄭聲之說則亦牽合甚矣自淫之義不明遂使談風俗者云鄭土狹而險山居谷汲男女亟㑹聚故其俗淫然則故檜地也為檜國時顧不土狹而險山居谷汲男女亟㑹聚歟而何檜詩之不淫也衛齊陳詩諸篇既亦有淫詩而鄭之淫詩舊唯束門之墠與溱洧為然則亦諸國等耳乃力改舊序以多其數而謂孔子舉重而言蓋非惟不得鄭聲之說亦非淫之本旨也問伊川云禮云後世雖有作者虞帝弗可及已如鳯凰來儀百獸率舞之事三代以後無此也是否曰不可及者謂其德之盛治之極而不可及非謂鳳儀獸舞也上古聖人之世無鳳儀獸舞者多豈皆可少之耶蓋舜時鳳鳥至史官遂以形容作樂之美豈正作簫韶之時鳳凰忽然而至歟抑他時歟至於百獸率舞尤是形容夫宗廟朝廷何有百獸豈作樂之時百獸皆來聚作樂之所相率而舞歟抑各在野而舞歟學者不以詞害義可也而遂以此律後世必得鳳儀獸舞而後為盛則聖人之治必不可為矣本語卷一
