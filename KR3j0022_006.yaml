body:
  text: 本語卷六明髙拱撰豫攝刑部時審録重囚蓋詳閲文卷者月餘乃集刑官於朝房件件面究者又十餘日又奏請朝審分為二日以盡其詳審時各令盡言面察其情頗為盡心是時重囚凡四百七十起乃審出寃獄一百三十九人其餘尚有情寃而證佐未甚的者不敢釋也因知司刑者亦甚草草至今每一念及猶甚哀矜焉祖宗之法宫闈不預朝政戚畹不干國典臣下不得交結朋黨紊亂朝政不得交結近侍官員扶同奏啓不得上言大臣德政意深矣哉或問赦曰赦甚害事有國者亦明刑而已矣何赦為何言之曰刑不清而恃赦則平日之戕良也多刑清而徒以赦則今日之縱惡也大每見赦後亡命無賴在配所者皆還舊惡不悛一時里閭甚受其害是放虎狼蛇蝎為仁而不計其所傷之衆也曰國有大慶獨加寬恤不可乎曰大慶當與君子共之而何縱小人為也曰易曰赦過宥罪書曰眚災肆赦不然乎曰過者無心之誤眚即過也災謂出於不幸者也故赦之乃書又曰宥過無大刑故無小夫茍過雖大必宥茍故雖小必刑固非不問過與故而咸赦除也且赦過者無日不然亦非數載而偶一行也是故赦過者雖無日不然而猶恐其少赦故者雖數載一行而猶病其多閣臣擬旨每云著法司從重擬罪此言大謬夫二罪俱發則從重論謂其有輕有重故獨從其重者也今一罪只有一律雖凌遲處死者亦只本律非一罪二律有輕者有重者而可以如此如彼也則何以從重乎曰從重是不用律矣問何謂失機曰機者勝敗存亡之機失機者失其機括而至於敗亡也律不可明言敗亡故曰失機猶之指斥乘輿謀危社稷乘輿謂天子也不敢言天子故言乘輿也社稷謂國家也不敢言國家故言社稷也由此言之則機可知矣今戰失三五軍士即謂失機夫戰固有委而棄之者矣機固在三五軍士耶聖人制刑所以詰姦禁亂安天下之民也固不可流於苛刻亦不可流於放縱乃今司刑者鹵莽草略既不盡心却又每以出人罪為長者雖盜賊皆曲意放之以為隂隲若然是謂明刑者為不仁也縱惡長姦殘害良善敗壞國事莫大於此人臣修怨者負國若於所怨者避嫌而不去或曲意用之亦負國何者人臣當以至公為心如其賢不去可也用之可也如其不賢而徒務逺己之嫌沽己之譽而以不肖之人貽害國家豈非不忠之甚乎然人每只以能用讐者為賢可見道術之不明也或曰世固有假為國之公而實以行其報怨之私者焉彼不愈於此乎曰是又奚足言哉大抵人臣不可有私有一分私心便於臣道有一分虧欠不論用讐去讐只有作意處便是私便負國也人臣茍有為國之心便自有推賢讓能之意如人於有才者則不能容嫌其勝己也超進者則不能容嫌其先己也剛直者則不能容嫌其性氣難相處也遂皆任情排去而國事無人幹濟略不之顧雖至喪人之國家所甘心焉皆是一箇己私無為國之心故也若有為國之心必且讓他替朝廷幹事那勝己先己有甚大事那自家難相處有甚大事故為國之人茍便於國即不便於己亦所必為不為國之人即十分便於國但有一毫不便於己者亦所不肯創業之君立法垂統如造屋然賴我祖宗造得屋子堅牢至今天下廕庇其下先輩還有人看守後來非惟不肯看守却被人日日拆損至今拆損益甚不復可再拆損矣然原來間架尚在茍有肯修葺者依舊牢固却只還去拆損誰曽換得一塊磚添得一片瓦祖宗萬年良法殊可惜也史云李林甫欲閉塞人主視聽自專大權明詔諫官謂曰今明主在上羣臣將順之不暇烏用多言諸君不見立仗馬乎食三品料一鳴輒斥去悔之何及補闕杜璡嘗上書言事明日黜為下邽令自是諌諍路絶矣史又云林甫城府深密人莫窺其際好以甘言啖人而隂中傷之不露辭色凡為上所厚者始則親結之及勢位稍逼輒以計去之雖老姦巨猾無能逃其術者嘻其亦姦之魁歟用人者不取其大每以一眚棄之故慷慨任事之臣鮮而國事不支不論其大而徒以無過用之故委托持祿之臣多而國事日廢昔子思薦茍變於衛侯衛侯曰吾知其可將然曽食人二雞子故弗用也子思曰聖人官人猶匠之用木取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄今以二卵而棄干城之將不可使聞於鄰國也梁主用段凝監大軍河上敬翔李振屢請易之梁主曰凝未有過振曰待其有過社稷已危矣用人者宜思此用人不論其才只取無過然非無過也未用耳用之而其過出矣猶不如前者多也其人雖不可用然未有代者不可輒去恐後更不如愈不好矣然必須豫求其人得其人則即去之可也教之廢未有甚於此時者也國制宗伯司教然乃祗具儀文化民成俗之道全未之講成均造士令教以孝弟忠信禮義廉恥監規在焉督學敕云學者讀書貴乎知而能行今皆不復省覽至於卧碑則士之經目者鮮矣科目以文藝取士士只文藝是競父兄師友之所督勉惟此而已而性命之理禮樂之實存心制行之方事君澤民之術漫然其不知也遂使天下之人惟務得官以為耀積槖以自肥始乎利終乎利寡廉鮮耻患得患失甘為鄙夫而不自知則以素無教故也於是國家欲求一知道理之人尚亦難得况有道德者乎然則治道何人興舉綱常何人肩任識者所為深慨也偶過一學究見其壁上有宋真宗勸學文云書中自有黃金屋書中自有千鍾粟書中車馬多如簇書中有女顔如玉豫取筆書其後云誠如此訓則其所養成者固皆淫泆驕侈殘民蠧國之人使在位皆若人喪無日矣而乃以為帝王之勸學悲夫欲興治道必振紀綱欲振紀綱必明賞罰欲明賞罰必辨是非欲辨是非必決壅蔽欲決壅蔽必懲欺罔欲懲欺罔必通言路言官之言雖未必可盡聽然山有猛獸藜藿不採必使敢言然後宄竊之輩不敢為姦縱有不可聽者必須容之勿遽震之威震之威則人皆結舌以言為戒倘有王莽曹操之竊國李林甫秦檜之弄權無人發覺人主何由得知之哉趙髙欲奪秦權恐羣臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右或默或言馬髙因隂中諸言鹿者以法後羣臣皆畏髙莫敢言其過蓋自古姦臣欲竊國柄者必塞言路而後可便其所為人君若能知開言路之利於國知塞言路之利於姦則自無難於聽言矣臣患君之不聽言而臣之言未必可聽君患臣無可聽之言而可聽之言君未必能聽夫言善而行國事乃成言不善而行國事乃傾臣可以必聽為得乎不善言是用其國乃殃善言是用其國乃昌君可以不聽為得乎唐憲宗問李絳曰諫官多謗訕朝政皆無事實朕欲謫其尤者一二人以警其餘如何絳對曰此殆非陛下之意必有邪臣欲塞蔽陛下之聰明也人臣死生繫人主喜怒敢發口諌者有幾就有諌者晝夜思維朝刪暮減比得上達什無二三故人主孜孜求諌猶恐不至况罪之乎如此杜天下之口非社稷之福也憲宗善其言而止斯意也不可不令人主知之今人不為聖賢之學則以為安常為聖賢之學者則以為好名也夫聖人之書人皆讀之矣止許讀其書乃不許講明而身體之歟今人不講大臣之業則以為守分講大臣之業則以為好進者也夫孔子匹夫而談帝王之事豈亦好進歟此風既久遂使聖賢之學不明於時大臣之業不見於世為學為政茍然而已尚何望孔孟而伊周耶或曰講學者却又立門户結黨與罔利文姦壞國家事談大臣事業者却又勦説以躐進故人惡之爾曰誠然夫沙中有金欲得金也而盡收其沙可乎欲去沙也而並棄其金可乎惟當國事者求之以誠鑒别能精收其真去其贋斯得人為用而又不為所溷矣若遂以魚目為明珠則又為禍大也人只看得箇功名重則遂甘心為盜賊為禽獸皆所不顧哀哉今之士風可為極敝從宦者全不知有君臣之義徒以善彌縫善推委移法以徇人者為賢而視君上如辨髦茍可欺蔽無弗為也亦全不知進退之節徒以善援附善躐取善賣法以持祿者為能而棄名節如土梗由他笑罵所甘心也有人言及君臣之義進退之節者則駭異而非笑之噫主本既亡廉恥又喪則宜其為公室之豺狼私門之鷹犬也已今人做官只於躐取髙崇權勢烜赫者則羡之更不問其得之正與不正其正色直言謫貶蹭蹬者則輕之更不問其守之正與不正理既不明氣亦不振一片軟熟成風低頭閉目奔趨巧媚以為善官這等模樣為禍不小脫有權姦誰其摘發脫有跋扈誰其批抗噫亦可畏也已裴晉公得遇憲宗建立功勳身係安危者二十餘年何其偉也後文宗時復出迄無所為人乃嘆其不遇向非有先立之功在人耳目以為證據而徒出於敬文之時則度亦常人而已矣人臣要以尊主庇民為心茍有是心惟其所為必皆有益於國不然則所為者莫非粉飾之具即奔走不息以為賢勞求諸其實皆無有也世之言治者必曰三代然夏有天下四百三十二年商六百四十五年周八百六十七年合為一千九百四十四年其間稱盛君可為法者禹湯文武而已守成之君則啓甲太戊武丁成康而已共止二百餘年餘皆不足觀矣夏啓之後篡弒纍世周至小雅陵遲已甚然則欲法三代者固自有在也三代而後如漢文帝者可為守成令主唐宋皆無之我孝皇則可與伯仲伊川先生云漢髙安能及我宋祖此言却過自今言之宋祖何敢望漢髙者而乃顛倒如是固是本朝開國之君然只稱其美諱其過而已豈得抑揚不倫之至是乎孔子周人何嘗獨稱武王勝似禹湯之君史稱李林甫媚事左右迎合上意以固其寵杜絶言路掩蔽聰明以成其姦妬賢嫉能排抑勝己以保其位屢起大獄誅逐貴臣以張其勢自皇太子以下畏之側足在相位十九年養成天下之亂而上不之悟也此不止林甫為然自古姦人亂國者大較若此良藥苦口利於病忠言逆耳利於行人君於犯顔極諫之臣不可遽以怒心待之須少寧耐回轉以觀其意之所在一回轉間景象就别始覺可怒而終覺其可嘉者有矣此等工夫人主不可不用每有言至即動此機比其熟日於聽言何有且此工夫在平時用更好蓋未有言至而先思其理當如此則平心和氣之時見理更真既能前定則對景時自不覺其言之忤矣要得天下治只在用人用人只在用三箇人一箇首相一箇冢宰一箇臺長首相得人則能平章天下事務件件停當冢宰得人則能進賢退不肖百官莫不稱職臺長得人則能振揚風紀有不法者率衆臺官糾治之而政體自清如此則元氣也充神氣也振天下何愁不治若其他用人行政都在三人項下固舉之矣然這三人中尤以首相為要媢嫉之人不止害賢害國而亦往往自害其身如元順帝時江淮盜起張九四據髙郵韓山童男據臨濠徐貞一倪蠻子陳友諒亂漢沔天下岌岌乎矣丞相托克托統大師四十萬出征聲勢赫然至髙郵連戰皆捷分遣兵平六合賊勢大蹙天下方有可望之勢而丞相哈瑪爾己忌其功讒於元主云天下怨托克托貶之可不煩兵而定元主納其讒遂詔散其兵而竄之師遂大潰皆為盜有天下遂不可為哈瑪爾猶慮托克托再入相矯詔鴆殺之後一年東南州郡多陷其言不驗乃受杖死夫當時何時也使托克托之功成則國可安國安則已身亦有所托而富貴可保乃徒以忌功為念讒托克托而又殺之不知托克托死而國不可支國不可支則吾身將何所托况國且未亡而身已先戮乎害人而身亦不免彼媢嫉者誠不知其何如為心也故曰天下亂無全國國亂無全家家亂無全身噫可以鑒矣周禮荒政十二其十一皆寬恤而終之以除盜賊王浚川云利之而後除之若曰可以生矣不悛而後殺之也然乎曰不然也年穀順成即有狗鼠之盜無能為亂凶年飢嵗民方窮苦無聊彼姦俠不逞之徒乘機竊發召呼之間流離餓殍易於相從亂之所由起也故良民之寬恤者不一而足而於盜賊獨加嚴焉曰除者加之意之辭也不止祛害安民亦所以弭釁端保國家也若謂利之而後除之則何時不然者而獨於荒年云爾乎世有等迂腐有司不識事體務為煦煦之政荒年賊民搶掠則曰彼飢也搶亦無妨嗟乎是縱之為亂也搶掠者邦有常刑固未曰荒年姑不行也而安得即以弛耶聖人之所致嚴者而俗吏以行其寬徒使孱良無主而地方日以多故其猶可撲滅者幸耳他日莫道夷簡不曾説來此非大臣之言也大臣以體國為心以濟國事為忠茍濟於國夷簡不曾説來何害茍無濟於國夷簡説來何為今不務事之必成而徒為形迹曰他日莫道夷簡不曽説來為立形迹以圖免己之咎是大臣體國之心濟事之忠乎人有比德則朝無公論彼其各結腹心各引羽翼則各言所言蒼黃反覆公論何從出問胡致堂云劉晏言利之臣君子所不道也然亦有可法者五而卒不免於誅死何也利於公必不利於私不利則怨生怨生則禍起故史稱衆頗嫉之是必有説以故善為國者不謀利善持身者不言利利對害而言背於義也然歟曰非也此正所謂徒以不言利為髙而使人不可為國者也夫晏也使其黷貨自豐是言利也然而所領者度支之官理財固其職也且死之日籍録其家惟雜書二乘米麥數斛而已而天下皆嘆其廉非徒利也使其為度支也務損下以媚上如桑𢎞羊輩之為是言利也乃史稱其理財以養民為先因平準法幹山海排商賈制萬物低昻操天下贏資以佐軍興雖用兵數十年斂不及民而用度足唐中僨而復振晏有勞焉是幹國之臣也利於公亦利於私國稱其能而民亦戴其惠者也非若桑𢎞羊輩之為者則何謂言利也夫以理財之官為言利是理財之官不當設也居理財之官而能舉其職者為言利是居理財之官者不當舉其職也而可乎晏功名日盛而眷遇甚隆故媢嫉之人如常衮輩者乃忌之非以聚財而為民所怨也至其誅死也則因昔嘗奉詔勘鞫元載罪伏誅其黨楊炎坐貶後炎專政銜私恨為載報讐遂誣搆以死而天下寃之使晏不勘載事雖理財固不死也勘載事雖不為理財固亦死也是非以理財死也明矣胡乃不察事實不為晏惜不咎德宗之不明不著楊炎之極惡而徒以晏曾理財而死遂謂是言利背義之為害如天道報惡者然亦謬矣將使司國計者不以足國為務而徒以不言利為髙則國家何利焉嗟乎兵以平亂乃不論丈人之師弟子之師而世俗之論徒曰兵者老氏之所忌是使天下無兵也刑以詰姦乃不論出乎哀矜出乎苛刻而世俗之論徒曰臯陶之無後為其主刑也而遂有縱盜賊以為隂隲者是使天下無刑也不特此耳龍逢比干亦皆誅死豈亦言利背義之為害耶固知胡氏之説不當事情不可以為訓也古云招之不來麾之不去理歟曰口談耳招之不來可也麾之如何不去國家財賦仰給東南漕糧不至則京師坐困然漕河甚可慮年年淤塞年年修築為功促迫勞費既多又不的當而挽運猶阻此其一也且一衣帶之水築之甚難決之甚易通之甚難塞之甚易意外之防尤不可忽此又其一也豫昔當國時念此至深乃計通海運非元之海洋中運也乃邊海一道商販私往來者自淮直達京師一風之便數日可至既不患於遲延而較諸漕河挽運且省無窮之力况海運既通則漕河自可安心修築不至迫促而罔功奏功之後二路並運脫有一路之阻亦自有一路之通京師可以坐俟無憂且國計既不專恃漕河則意外之防可弭所以代謀者即此而在此萬年之計也先是豫議開膠河蓋前人曾為而未成者開此則自淮入海直達天津甚近乃差科官往勘有司者胥謂難成然恐拂豫意不敢言豫審知之即貽書科官曰吾所為開海運者為國也獨奈何以難成之事病國乎既不便即已之豫固無成心也然糧運可慮其語諸有司當更思所以為計者於是梁巡撫夢龍王布政宗沐胥以揭帖報豫曰海邊一道乃商販私通往來者自淮抵京更捷且邊海不險又不費修築甚便可行豫聞甚喜即令奏上豫力主持行之二君區畫周詳措處停妥造船堅好諸事完備海運遂通刻日而至人皆快之會豫去位當事者務反吾所為隨議罷所造海舟棄之無用沿海諸備皆廢可惜也然此計終難寢當必有為國謀忠者姑書記之議罷海運者謂偶有六七艘之漂溺也然昔漕河泛漲衝決時曾以百萬石委之泥沙詎啻六七艘哉聞之山東邊海人云海行須有節次惟海人知之經略者亦曾設有海人乃運官專其利不用故溺今海運不行海人猶商販往來無患獨無糧船耳豫聞而三嘆夫不求弊之所在而徒因噎廢食縱他日必有行時然又勞費一番矣本語卷六
